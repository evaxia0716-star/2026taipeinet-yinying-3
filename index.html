<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>台北有影 3｜2026 專案進度追蹤</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f0faf8;
        --surface: #ffffff;
        --surface2: #e6f5f2;
        --border: #c8e6e0;
        --border2: #a8d5cc;
        --accent: #0d9488;
        --accent-hover: #0f766e;
        --text: #1a3330;
        --text-dim: #3d5c57;
        --text-muted: #5f8a84;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
      }

      body {
        font-family: "Noto Sans TC", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: #134e4a;
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 68px;
        box-shadow: 0 2px 12px rgba(13, 74, 70, 0.25);
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }

      .logo {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.72rem;
        letter-spacing: 0.2em;
        color: #5eead4;
        text-transform: uppercase;
      }

      .project-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: #ffffff;
      }

      .project-title .year {
        color: #99f6e4;
        font-size: 0.9rem;
        font-weight: 400;
        margin-left: 0.5rem;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .font-ctrl {
        display: flex;
        gap: 0.3rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.45rem 1rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.12);
        color: #e0fdf4;
        font-family: "Noto Sans TC", sans-serif;
        font-size: 0.88rem;
        cursor: pointer;
        transition: all 0.15s;
        text-decoration: none;
      }

      .btn:hover {
        background: rgba(255, 255, 255, 0.24);
        color: #fff;
      }

      .btn-accent {
        background: #0d9488;
        border-color: #0d9488;
        color: #fff;
        font-weight: 700;
        box-shadow: 0 2px 6px rgba(13, 148, 136, 0.4);
      }

      .btn-accent:hover {
        background: #0f766e;
        border-color: #0f766e;
      }

      .font-btn {
        padding: 0.35rem 0.65rem;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .stats-bar {
        background: #fff;
        border-bottom: 1px solid var(--border);
        padding: 0.9rem 2rem;
        display: flex;
        align-items: center;
        gap: 2.2rem;
        overflow-x: auto;
      }

      .stat-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        white-space: nowrap;
      }

      .stat-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .stat-label {
        font-size: 0.9rem;
        color: var(--text-dim);
        font-weight: 500;
      }

      .stat-val {
        font-family: "IBM Plex Mono", monospace;
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--text);
      }

      .progress-section {
        background: #fff;
        border-bottom: 1px solid var(--border);
        padding: 0.9rem 2rem;
        display: flex;
        align-items: center;
        gap: 1.5rem;
        flex-wrap: wrap;
      }

      .progress-label {
        font-size: 0.9rem;
        color: var(--text-dim);
        font-weight: 600;
        white-space: nowrap;
      }

      .progress-bar-wrap {
        flex: 1;
        min-width: 180px;
        height: 8px;
        background: var(--surface2);
        border-radius: 4px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #0d9488, #059669);
        border-radius: 4px;
        transition: width 0.4s;
      }

      .progress-pct {
        font-family: "IBM Plex Mono", monospace;
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--accent);
      }

      .toolbar {
        background: #fff;
        border-bottom: 2px solid var(--border);
        padding: 0.55rem 2rem;
        display: flex;
        align-items: center;
        gap: 0.3rem;
        flex-wrap: wrap;
      }

      .filter-label {
        font-size: 0.88rem;
        color: var(--text-dim);
        font-weight: 700;
        margin-right: 0.1rem;
      }

      .filter-btn {
        padding: 0.3rem 0.7rem;
        border-radius: 20px;
        border: 1.5px solid var(--border2);
        background: #fff;
        color: var(--text-dim);
        font-family: "Noto Sans TC", sans-serif;
        font-size: 0.84rem;
        cursor: pointer;
        transition: all 0.15s;
        font-weight: 500;
      }

      .filter-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: #f0faf8;
      }

      .filter-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        font-weight: 700;
      }

      .filter-btn[data-cat="行政準備"].active {
        background: #2563eb;
        border-color: #2563eb;
      }

      .filter-btn[data-cat="影片徵選"].active {
        background: #7c3aed;
        border-color: #7c3aed;
      }

      .filter-btn[data-cat="頒獎典禮"].active {
        background: #b45309;
        border-color: #b45309;
      }

      .filter-btn[data-cat="市民大聲說"].active {
        background: #059669;
        border-color: #059669;
      }

      .filter-btn[data-cat="人才培訓"].active {
        background: #be185d;
        border-color: #be185d;
      }

      .toolbar-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }

      .add-task-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.48rem 1.15rem;
        border-radius: 8px;
        background: var(--accent);
        border: none;
        color: #fff;
        font-family: "Noto Sans TC", sans-serif;
        font-size: 0.92rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
        box-shadow: 0 2px 6px rgba(13, 148, 136, 0.3);
      }

      .add-task-btn:hover {
        background: var(--accent-hover);
        box-shadow: 0 3px 10px rgba(13, 148, 136, 0.4);
      }

      .view-toggle {
        display: flex;
        border: 1.5px solid var(--border2);
        border-radius: 8px;
        overflow: hidden;
      }

      .view-btn {
        padding: 0.4rem 0.95rem;
        border: none;
        background: transparent;
        color: var(--text-dim);
        font-family: "Noto Sans TC", sans-serif;
        font-size: 0.88rem;
        cursor: pointer;
        transition: all 0.15s;
        font-weight: 500;
      }

      .view-btn.active {
        background: var(--accent);
        color: #fff;
        font-weight: 700;
      }

      .view-btn:hover:not(.active) {
        background: var(--surface2);
        color: var(--text);
      }

      .search-wrap {
        position: relative;
      }

      .search-input {
        background: #fff;
        border: 1.5px solid var(--border2);
        border-radius: 8px;
        padding: 0.42rem 0.85rem 0.42rem 2.1rem;
        color: var(--text);
        font-family: "Noto Sans TC", sans-serif;
        font-size: 0.9rem;
        width: 210px;
        outline: none;
        transition: all 0.15s;
      }

      .search-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12);
      }

      .search-input::placeholder {
        color: var(--text-muted);
      }

      .search-icon {
        position: absolute;
        left: 0.6rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 0.85rem;
        pointer-events: none;
      }

      .table-wrap {
        overflow-x: auto;
        padding: 0 2rem 5rem;
      }

      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: 1rem;
        font-size: 0.97rem;
      }

      thead th {
        padding: 0.75rem 0.9rem;
        text-align: left;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
        border-bottom: 2px solid var(--border);
        white-space: nowrap;
        position: sticky;
        top: 68px;
        background: var(--bg);
        z-index: 30;
      }

      thead th:first-child {
        padding-left: 0;
      }

      .col-group {
        width: 100px;
      }

      .col-date {
        width: 120px;
      }

      .col-task {
        min-width: 280px;
      }

      .col-unit {
        width: 160px;
      }

      .col-status {
        width: 128px;
      }

      .col-note {
        min-width: 240px;
      }

      .col-actions {
        width: 50px;
      }

      tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.1s;
      }

      tbody tr:hover {
        background: #f0fdf8;
      }

      tbody tr.hidden {
        display: none;
      }

      tbody td {
        padding: 0.95rem 0.9rem;
        vertical-align: top;
      }

      tbody td:first-child {
        padding-left: 0;
      }

      tbody tr.row-overdue {
        background: #fff5f5;
      }

      tbody tr.row-overdue:hover {
        background: #fee8e8;
      }

      tbody tr.row-warning {
        background: #fffdf0;
      }

      tbody tr.row-warning:hover {
        background: #fef9c3;
      }

      .date-overdue {
        color: #dc2626 !important;
        font-weight: 800 !important;
      }

      .date-warning {
        color: #d97706 !important;
        font-weight: 700 !important;
      }

      .group-tag-select {
        appearance: none;
        padding: 0.28rem 0.7rem;
        border-radius: 5px;
        font-size: 0.82rem;
        font-weight: 700;
        white-space: nowrap;
        cursor: pointer;
        outline: none;
        border: 1.5px solid;
        font-family: "Noto Sans TC", sans-serif;
        transition: all 0.15s;
      }

      .group-tag-select.tag-行政準備 {
        background: #dbeafe;
        color: #1e40af;
        border-color: #93c5fd;
      }

      .group-tag-select.tag-影片徵選 {
        background: #ede9fe;
        color: #5b21b6;
        border-color: #c4b5fd;
      }

      .group-tag-select.tag-頒獎典禮 {
        background: #fef3c7;
        color: #92400e;
        border-color: #fcd34d;
      }

      .group-tag-select.tag-市民大聲說 {
        background: #d1fae5;
        color: #065f46;
        border-color: #6ee7b7;
      }

      .group-tag-select.tag-人才培訓 {
        background: #fce7f3;
        color: #9d174d;
        border-color: #f9a8d4;
      }

      .tag-行政準備 {
        background: #dbeafe;
        color: #1e40af;
        border: 1.5px solid #93c5fd;
      }

      .tag-影片徵選 {
        background: #ede9fe;
        color: #5b21b6;
        border: 1.5px solid #c4b5fd;
      }

      .tag-頒獎典禮 {
        background: #fef3c7;
        color: #92400e;
        border: 1.5px solid #fcd34d;
      }

      .tag-市民大聲說 {
        background: #d1fae5;
        color: #065f46;
        border: 1.5px solid #6ee7b7;
      }

      .tag-人才培訓 {
        background: #fce7f3;
        color: #9d174d;
        border: 1.5px solid #f9a8d4;
      }

      .date-text {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.9rem;
        color: var(--text-dim);
        font-weight: 600;
      }

      .task-content {
        line-height: 1.65;
        color: var(--text);
      }

      .task-badge {
        display: inline-block;
        font-size: 0.75rem;
        padding: 0.12rem 0.42rem;
        border-radius: 3px;
        margin-bottom: 0.35rem;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .badge-new {
        background: #dbeafe;
        color: #1e40af;
        border: 1px solid #93c5fd;
      }

      .badge-warn {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fca5a5;
      }

      .badge-tip {
        background: #fef9c3;
        color: #854d0e;
        border: 1px solid #fde047;
      }

      .task-editable {
        cursor: text;
        outline: none;
        display: block;
      }

      .task-editable:focus {
        background: #f0fdf8;
        border-radius: 4px;
        outline: 1.5px solid var(--accent);
        padding: 0.2rem 0.4rem;
        margin: -0.2rem -0.4rem;
      }

      .unit-text {
        font-size: 0.9rem;
        color: var(--text-dim);
      }

      .status-select {
        appearance: none;
        background: transparent;
        border: 1.5px solid;
        border-radius: 20px;
        padding: 0.3rem 0.75rem;
        font-family: "Noto Sans TC", sans-serif;
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        outline: none;
        transition: all 0.15s;
      }

      .status-待開始 {
        color: #455a64;
        border-color: #90a4ae;
        background: #f5f7f8;
      }

      .status-進行中 {
        color: #01579b;
        border-color: #29b6f6;
        background: #e1f5fe;
      }

      .status-已完成 {
        color: #1b5e20;
        border-color: #66bb6a;
        background: #e8f5e9;
      }

      .status-待確認 {
        color: #bf360c;
        border-color: #ffa726;
        background: #fff3e0;
      }

      .status-延遲 {
        color: #b71c1c;
        border-color: #ef9a9a;
        background: #ffebee;
      }

      .note-cell {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .note-original {
        font-size: 0.9rem;
        color: var(--text-dim);
        line-height: 1.55;
        word-break: break-word;
        white-space: pre-wrap;
      }

      .note-comment {
        background: #fffde7;
        border-left: 3px solid #f59e0b;
        border-radius: 0 6px 6px 0;
        padding: 0.6rem 0.75rem;
        font-size: 0.9rem;
        color: var(--text);
        line-height: 1.6;
        min-height: 3.5rem;
        outline: none;
        transition: all 0.15s;
        font-family: "Noto Sans TC", sans-serif;
        word-break: break-word;
        white-space: pre-wrap;
        overflow-wrap: break-word;
      }

      .note-comment:focus {
        background: #fff9c4;
        border-left-color: #d97706;
      }

      .note-comment:empty::before {
        content: attr(data-placeholder);
        color: var(--text-muted);
        white-space: normal;
      }

      .row-actions {
        display: flex;
        opacity: 0;
        transition: opacity 0.15s;
      }

      tr:hover .row-actions {
        opacity: 1;
      }

      .action-btn {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 5px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 0.82rem;
        transition: all 0.15s;
      }

      .action-btn:hover {
        border-color: #fca5a5;
        color: #dc2626;
        background: #fef2f2;
      }

      .action-btn.edit-btn:hover {
        border-color: #6ee7b7;
        color: #059669;
        background: #f0fdf8;
      }

      .month-divider td {
        padding: 2.6rem 0.9rem 0.7rem;
        background: var(--bg) !important;
        position: relative;
        z-index: 5;
        overflow: visible;
      }

      #table-body tr.month-divider:first-child td, #table-body tr.month-divider.first-visible-month td {
        padding-top: calc(36px + 2rem);
      }

      .month-label {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.75rem;
        line-height: 1.35;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-dim);
        font-weight: 700;
        padding: 0.35rem 0.75rem;
        border: 1.5px solid var(--border2);
        border-radius: 5px;
        background: #fff;
        display: inline-block;
        position: relative;
        z-index: 6;
      }

      #calendar-view {
        padding: 0 2rem 5rem;
      }

      .cal-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.5rem 0 1rem;
      }

      .cal-nav .btn {
        background: #fff;
        color: var(--text);
        border: 1.5px solid var(--border2);
      }

      .cal-nav .btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: #f0faf8;
      }

      .cal-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text);
      }

      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 1px;
        background: var(--border);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }

      .cal-day-header {
        background: #134e4a;
        color: #99f6e4;
        padding: 0.65rem;
        text-align: center;
        font-size: 0.85rem;
        font-weight: 700;
      }

      .cal-day {
        background: #fff;
        min-height: 115px;
        padding: 0.65rem;
      }

      .cal-day.empty {
        background: #f5faf8;
      }

      .cal-day.today {
        background: #f0fdf8;
      }

      .cal-day-num {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--text-dim);
        margin-bottom: 0.45rem;
      }

      .cal-day.today .cal-day-num {
        color: var(--accent);
        font-weight: 900;
      }

      .cal-task-chip {
        display: block;
        font-size: 0.78rem;
        padding: 0.2rem 0.48rem;
        border-radius: 4px;
        margin-bottom: 0.28rem;
        line-height: 1.4;
        cursor: pointer;
        transition: opacity 0.12s;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-weight: 600;
      }

      .cal-task-chip:hover {
        opacity: 0.7;
      }

      .cal-more {
        font-size: 0.78rem;
        color: var(--text-muted);
        cursor: pointer;
        margin-top: 0.15rem;
        font-weight: 600;
      }

      .cal-legend {
        display: flex;
        gap: 0.85rem;
        margin-top: 1.1rem;
        flex-wrap: wrap;
      }

      .cal-leg-dot {
        display: inline-block;
        padding: 0.13rem 0.5rem;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 600;
      }

      #dashboard-view {
        padding: 0 2rem 5rem;
      }

      .dash-header {
        padding: 1.4rem 0 1.2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      .dash-header h2 {
        font-size: 1.12rem;
        font-weight: 700;
        color: var(--text);
      }

      .dash-header p {
        font-size: 0.84rem;
        color: var(--text-muted);
        margin-top: 0.2rem;
      }

      .dash-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.15rem;
        margin-bottom: 1.15rem;
      }

      @media (max-width: 1000px) {
        .dash-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 640px) {
        .dash-grid {
          grid-template-columns: 1fr;
        }
      }

      .dash-card {
        background: #fff;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 1.2rem 1.4rem;
      }

      .dash-card-title {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
        margin-bottom: 0.9rem;
        padding-bottom: 0.5rem;
        border-bottom: 1.5px solid var(--border);
      }

      .cat-row {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        margin-bottom: 0.65rem;
      }

      .cat-row:last-child {
        margin-bottom: 0;
      }

      .cat-name {
        font-size: 0.84rem;
        font-weight: 600;
        min-width: 78px;
      }

      .cat-bar-wrap {
        flex: 1;
        height: 8px;
        background: var(--surface2);
        border-radius: 4px;
        overflow: hidden;
      }

      .cat-bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.5s ease;
      }

      .cat-pct {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;

        { id: 81, cat: "行政準備", date: "12/20", task: "找春酒的場地+長官/業者伴手禮", unit: "北都行銷部", status: "待開始", note: "", badge: "", comment: "以往是訂在3月中\n國軍英雄館、驥元" }
      ];
      let data = [], nextId = 100, currentFilter = "全部", currentSearch = "", currentView = "list";
      const MONTHS_ZH = ["", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十", "十一", "十二"];
      const CATS = ["行政準備", "影片徵選", "頒獎典禮", "市民大聲說", "人才培訓"];
      const CAT_COLORS = { 行政準備: "#3b82f6", 影片徵選: "#8b5cf6", 頒獎典禮: "#f59e0b", 市民大聲說: "#10b981", 人才培訓: "#ec4899" };

      // ──────────────────────────────────────────────────────────────
      // 任務類型與日期解析（隱藏欄位 kind，只供儀表板邏輯使用）
      //   point    — 單一日期，當天就是截止日（鬧鐘響一次）
      //   window   — 期間任務，整段持續進行（馬拉松全程）
      //   deadline — 範圍寫法，尾巴是截止日（暑假作業）
      //
      // 規則：
      //   1. row.kind 若已標註 → 直接採用
      //   2. WINDOW_TASK_IDS 內的 id → 視為 window（資料相容用）
      //   3. 預設：單一日期 → point；範圍 → deadline
      //
      // 範圍日期的開頭 = 可開始日；尾巴 = 截止日
      // 單一日期的開始與截止相同
      // ──────────────────────────────────────────────────────────────
      const WINDOW_TASK_IDS = new Set([22, 40, 79, 43, 53]);

      function getKind(row) {
        if (row && row.kind) return row.kind;
        if (row && WINDOW_TASK_IDS.has(row.id)) return "window";
        return /[–\-~～]/.test(row.date) ? "deadline" : "point";
      }

      function parseSingleDate(s) {
        if (!s) return null;
        const f = String(s).trim().split("/");
        if (f.length < 2) return null;
        const m = parseInt(f[0]);
        const d = parseInt(f[1]);
        if (isNaN(m) || isNaN(d)) return null;
        const dt = new Date(new Date().getFullYear(), m - 1, d);
        dt.setHours(0, 0, 0, 0);
        return dt;
      }

      function parseDateRange(dateStr) {
        if (!dateStr) return { start: null, end: null };
        const parts = String(dateStr).split(/[–\-~～]/);
        const start = parseSingleDate(parts[0]);
        const end = parts[1] ? parseSingleDate(parts[1]) : start;
        return { start, end };
      }

      function getStartDate(row) { return parseDateRange(row.date).start; }
      function getDueDate(row)   { return parseDateRange(row.date).end; }

      function getDaysLeft(row) {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const due = getDueDate(row);
        if (!due) return null;
        return Math.round((due - today) / 86400000);
      }
      function getDaysToStart(row) {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const start = getStartDate(row);
        if (!start) return null;
        return Math.round((start - today) / 86400000);
      }

      function urgencyLevel(row) {
        if (row.status === "已完成") return "";
        const d = getDaysLeft(row);
        if (d === null) return "";
        if (d < 0) return "overdue";
        if (d <= 3 && row.status === "待開始") return "warning";
        // 期間任務的智慧預警：開跑日已到、卻還停在「待開始」
        if (getKind(row) === "window" && row.status === "待開始") {
          const ds = getDaysToStart(row);
          if (ds !== null && ds <= 0) return "warning";
        }
        return "";
      }

      // 舊函式名稱別名（避免其他地方呼叫出錯）
      function getTaskType(row) {
        const k = getKind(row);
        return k === "point" ? "reminder" : k === "window" ? "ongoing" : "deadline";
      }
      function parseDateFirst(s) {
        const d = parseSingleDate(String(s).split(/[–\-~～]/)[0]);
        return d ? { month: d.getMonth() + 1, day: d.getDate() } : null;
      }

      function renderTable() {
        const tbody = document.getElementById("table-body");
        tbody.innerHTML = "";
        let lastM = null;
        data.forEach((row) => {
          const m = parseInt(row.date.split("/")[0]);
          if (m !== lastM) {
            const tr = document.createElement("tr");
            tr.className = "month-divider";
            tr.dataset.month = m;
            tr.innerHTML = `<td colspan="7"><span class="month-label">${MONTHS_ZH[m] || m}月</span></td>`;
            tbody.appendChild(tr);
            lastM = m;
          }
          const badge =
            row.badge === "new" ? '<span class="task-badge badge-new">NEW</span><br>'
            : row.badge === "warn" ? '<span class="task-badge badge-warn">⚠ 注意</span><br>'
            : row.badge === "tip" ? '<span class="task-badge badge-tip">💡 建議</span><br>'
            : "";
          const urg = urgencyLevel(row);
          const dateCls = urg === "overdue" ? " date-overdue" : urg === "warning" ? " date-warning" : "";
          const tr = document.createElement("tr");
          tr.dataset.id = row.id;

      let taskModalId = null;

      function switchView(view) {
        currentView = view;
        document.getElementById("btn-list").classList.toggle("active", view === "list");
        document.getElementById("btn-dash").classList.toggle("active", view === "dashboard");
        document.getElementById("btn-cal").classList.toggle("active", view === "calendar");

        document.getElementById("calendar-view").style.display = view === "calendar" ? "" : "none";
        if (view === "calendar") renderCalendar();
        if (view === "dashboard") renderDashboard();
      }
      let calMonth = 4, calYear = 2026;
      const CAL_MONTH_ZH = ["一", "二", "三", "四", "五", "六", "七", "八", "九", "十", "十一", "十二"];
      const CAL_DAY = ["日", "一", "二", "三", "四", "五", "六"];
      function chipStyle(cat) {
        return ({
          行政準備: "background:#dbeafe;border:1px solid #93c5fd;color:#1e40af",
          影片徵選: "background:#ede9fe;border:1px solid #c4b5fd;color:#5b21b6",
          頒獎典禮: "background:#fef3c7;border:1px solid #fcd34d;color:#92400e",
          市民大聲說: "background:#d1fae5;border:1px solid #6ee7b7;color:#065f46",
          人才培訓: "background:#fce7f3;border:1px solid #f9a8d4;color:#9d174d",
        }[cat] || "background:#f0f4f4;color:#3d5c57");
      }
      function renderCalendar() {
        document.getElementById("cal-title").textContent = `${calYear} 年　${CAL_MONTH_ZH[calMonth]}月`;
        const first = new Date(calYear, calMonth, 1).getDay();
        const days = new Date(calYear, calMonth + 1, 0).getDate();
        const today = new Date();
        const byDay = {};
        data.forEach((r) => {
          if (currentFilter !== "全部" && r.cat !== currentFilter) return;
          if (currentSearch && !r.task.toLowerCase().includes(currentSearch) && !r.cat.toLowerCase().includes(currentSearch)) return;
          const d = parseDateFirst(r.date);
          if (d && d.month === calMonth + 1) {
            if (!byDay[d.day]) byDay[d.day] = [];
            byDay[d.day].push(r);
          }
        });
        let h = CAL_DAY.map((d) => `<div class="cal-day-header">${d}</div>`).join("");
        for (let i = 0; i < first; i++) h += `<div class="cal-day empty"></div>`;
        for (let d = 1; d <= days; d++) {
          const isToday = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === d;
          const tasks = byDay[d] || [], show = tasks.slice(0, 3), more = tasks.length - 3;
          const chips = show.map((t) => `<span class="cal-task-chip" style="${chipStyle(t.cat)}" onclick="openTaskModal(${t.id})" title="${t.task}">${t.task.replace(/【.*?】/g, "").trim().slice(0, 14)}</span>`).join("");
          const moreBtn = more > 0 ? `<div class="cal-more" onclick="switchView('list')">+${more} 項</div>` : "";
          h += `<div class="cal-day${isToday ? " today" : ""}"><div class="cal-day-num">${d}</div>${chips}${moreBtn}</div>`;
        }
        document.getElementById("cal-grid").innerHTML = h;
      }
      function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }
      function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); }

      // ──────────────────────────────────────────────────────────────
      // 本週作戰清單：把三種任務揉成同一份待辦
      //   point    → 看 due，本週要做
      //   deadline → 看 due，本週要截止；若已逾期/待開始＜3天→紅
      //   window   → 看 start（本週開跑）或 due（本週收尾，待開始時亮紅）
      //              或在窗內卻還停在待開始 → 警告
      // ──────────────────────────────────────────────────────────────
      function getWeeklyActions() {
        const items = [];
        data.forEach((row) => {
          if (row.status === "已完成") return;
          const kind = getKind(row);
          const dDue = getDaysLeft(row);
          const dStart = getDaysToStart(row);
          if (dDue === null) return;

          let include = false, chip = "", action = "", chipCls = "", actCls = "", urgCls = "", sortKey = 999;

          if (kind === "point") {
            if (dDue < -3 || dDue > 7) return;
            include = true;
            sortKey = dDue;
            if (dDue < 0) { chip = `逾 ${-dDue} 天`; chipCls = "chip-overdue"; urgCls = "urg-danger"; action = "已逾期"; actCls = "act-danger"; }
            else if (dDue === 0) { chip = "今天"; chipCls = "chip-today"; urgCls = "urg-danger"; action = "今天開始"; actCls = "act-danger"; }
            else if (dDue === 1) { chip = "明天"; chipCls = "chip-warn"; urgCls = "urg-warn"; action = "明天準備開始"; actCls = "act-warn"; }
            else if (dDue <= 3) { chip = `${dDue} 天後`; chipCls = "chip-warn"; urgCls = "urg-warn"; action = `${dDue} 天後事件開始`; actCls = "act-warn"; }
            else { chip = `${dDue} 天後`; action = `${dDue} 天候事件開始`; }
          } else if (kind === "deadline") {
            if (dDue >= -3 && dDue <= 7) {
              include = true;
              sortKey = dDue - 0.1;
              if (dDue < 0) { chip = `逾 ${-dDue} 天`; chipCls = "chip-overdue"; urgCls = "urg-danger"; action = "已逾期"; actCls = "act-danger"; }
              else if (dDue === 0) { chip = "今天"; chipCls = "chip-today"; urgCls = "urg-danger"; action = "今天截止"; actCls = "act-danger"; }
              else if (dDue <= 3 && row.status === "待開始") { chip = `剩 ${dDue} 天`; chipCls = "chip-soon"; urgCls = "urg-danger"; action = "還沒動・趕快開始"; actCls = "act-danger"; }
              else if (dDue <= 3) { chip = `${dDue} 天後`; chipCls = "chip-warn"; urgCls = "urg-warn"; action = `${dDue} 天後截止`; actCls = "act-warn"; }
              else { chip = `${dDue} 天後`; action = `${dDue} 天後截止`; }
            } else if (dStart !== null && dStart >= 0 && dStart <= 7) {
              include = true;
              sortKey = dStart + 0.3;
              chip = dStart === 0 ? "可開始" : `${dStart} 天後`;
              action = "本週可動工";
            } else { return; }
          } else if (kind === "window") {
            const inWindow = dStart !== null && dStart <= 0 && dDue >= 0;
            const opensThisWeek = dStart !== null && dStart >= 0 && dStart <= 7;
            const closesThisWeek = dDue >= 0 && dDue <= 7;
            const startedNotBegun = inWindow && row.status === "待開始";

            if (dDue < 0) {
              include = true; sortKey = dDue;
              chip = `逾 ${-dDue} 天`; chipCls = "chip-overdue"; urgCls = "urg-danger"; action = "已過期"; actCls = "act-danger";
            } else if (opensThisWeek) {
              include = true; sortKey = dStart + 0.5;
              if (dStart === 0) { chip = "今天開跑"; chipCls = "chip-today"; }
              else if (dStart === 1) { chip = "明天開跑"; chipCls = "chip-warn"; }
              else { chip = `${dStart} 天後`; }
              action = "本週開跑";
            } else if (closesThisWeek) {
              include = true; sortKey = dDue + 0.2;
              if (row.status === "待開始") {
                chip = `剩 ${dDue} 天`; chipCls = "chip-soon"; urgCls = "urg-danger";
                action = "還沒動・收尾警告"; actCls = "act-danger";
              } else {
                chip = `剩 ${dDue} 天`; chipCls = "chip-warn"; urgCls = "urg-warn";
                action = "本週收尾"; actCls = "act-warn";
              }
            } else if (startedNotBegun) {
              include = true; sortKey = 5;
              chip = "進行中"; chipCls = "chip-warn"; urgCls = "urg-warn";
              action = "還沒動・該開工"; actCls = "act-warn";
            } else { return; }
          }

          if (include) items.push({ row, kind, chip, chipCls, action, actCls, urgCls, sortKey });
        });
        items.sort((a, b) => a.sortKey - b.sortKey);
        return items;
      }

      function renderWeeklyActions() {
        const items = getWeeklyActions();
        const legend = `<div class="week-legend">
          <span class="week-legend-item pill-point">提醒・鬧鐘</span>
          <span class="week-legend-item pill-window">期間・馬拉松</span>
          <span class="week-legend-item pill-deadline">截止・暑假作業</span>
        </div>`;
        if (items.length === 0) {
          return `<div class="dash-card week-card">
            <div class="dash-card-title">⚔ 本週作戰清單</div>
            ${legend}
            <div class="week-empty">✅ 本週沒有需要立即動手的任務</div>
          </div>`;
        }
        const kindLabel = { point: "提醒", window: "期間", deadline: "截止" };
        const rows = items.map((it) => {
          const { row, kind, chip, chipCls, action, actCls, urgCls } = it;
          const cleanTask = row.task.replace(/【.*?】/g, "").trim();
          return `<div class="week-row ${urgCls}" onclick="openTaskModal(${row.id})">
            <div class="week-chip ${chipCls}">${chip}</div>
            <div class="week-content">
              <div class="week-title"><span class="week-pill pill-${kind}">${kindLabel[kind]}</span>${cleanTask}</div>
              <div class="week-meta">${row.cat}　・　${row.date}</div>
            </div>
            <div class="week-action ${actCls}">${action}</div>
          </div>`;
        }).join("");
        return `<div class="dash-card week-card">
          <div class="dash-card-title">⚔ 本週作戰清單　<span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted);font-size:0.78rem;margin-left:0.5rem">共 ${items.length} 項</span></div>
          ${legend}
          ${rows}
        </div>`;
      }

      function renderDashboard() {
        const overdueTasks = data.filter((r) => urgencyLevel(r) === "overdue");
        const warningTasks = data.filter((r) => urgencyLevel(r) === "warning");
        const catStats = CATS.map((cat) => {
          const tasks = data.filter((r) => r.cat === cat);
          const done = tasks.filter((r) => r.status === "已完成").length;
          const total = tasks.length;
          const pct = total ? Math.round((done / total) * 100) : 0;
          return { cat, done, total, pct };
        });
        const upcoming = data.filter((r) => {
          if (r.status === "已完成") return false;
          if (getKind(r) === "window") return false;
          const d = getDaysLeft(r);
          return d !== null && d >= -7 && d <= 14;
        }).sort((a, b) => (getDaysLeft(a) ?? 999) - (getDaysLeft(b) ?? 999)).slice(0, 9);
        const upcomingStart = data.filter((r) => {
          if (r.status === "已完成") return false;
          if (getKind(r) !== "window") return false;
          const d = getDaysLeft(r);
          return d !== null && d >= 0 && d <= 14;
        }).sort((a, b) => (getDaysLeft(a) ?? 999) - (getDaysLeft(b) ?? 999)).slice(0, 5);
        const statusKeys = ["待開始", "進行中", "已完成", "待確認", "延遲"];
        const catStatusCards = CATS.map((cat) => {
          const tasks = data.filter((r) => r.cat === cat);
          const cnt = {};
          statusKeys.forEach((s) => { cnt[s] = tasks.filter((r) => r.status === s).length; });
          const pct = tasks.length ? Math.round((cnt["已完成"] / tasks.length) * 100) : 0;
          const lines = statusKeys.filter((s) => cnt[s] > 0).map((s) => `<div class="cat-status-line"><span>${s}</span><span>${cnt[s]}</span></div>`).join("");
          return `<div class="cat-status-card"><div class="cat-status-name" style="color:${CAT_COLORS[cat]}">${cat}</div><div style="font-family:'IBM Plex Mono',monospace;font-size:1.1rem;font-weight:900;color:${CAT_COLORS[cat]};margin-bottom:0.4rem">${pct}%</div>${lines}</div>`;
        }).join("");
        const overdueHTML = overdueTasks.length
          ? overdueTasks.slice(0, 5).map((r) => {
              const d = getDaysLeft(r);
              return `<div class="overdue-row">逾${Math.abs(d)}天・${r.task.replace(/【.*?】/g, "").trim().slice(0, 22)}（${r.date}）</div>`;
            }).join("") + (overdueTasks.length > 5 ? `<div style="font-size:0.8rem;color:#dc2626;margin-top:0.3rem">...共 ${overdueTasks.length} 項逾期</div>` : "")
          : '<div style="color:#059669;font-size:0.85rem;padding:0.3rem 0">✅ 無逾期任務</div>';
        const upcomingHTML = upcoming.length
          ? upcoming.map((r) => {
              const d = getDaysLeft(r);
              const color = d < 0 ? "#dc2626" : d <= 3 ? "#d97706" : "#059669";
              const bg = d < 0 ? "#fee2e2" : d <= 3 ? "#fff3e0" : "#f0fdf8";
              const label = d < 0 ? `逾${Math.abs(d)}天` : d === 0 ? "今天" : d === 1 ? "明天" : `${d}天後`;
              return `<div class="dl-item"><span class="dl-tag" style="background:${bg};color:${color}">${label}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)">${r.task.replace(/【.*?】/g, "").trim().slice(0, 20)}</span><span style="font-size:0.76rem;color:var(--text-muted);flex-shrink:0;font-family:'IBM Plex Mono',monospace">${r.cat.slice(0, 4)}</span></div>`;
            }).join("")
          : '<div style="color:var(--text-muted);font-size:0.88rem;padding:0.3rem 0">近期無截止任務</div>';
        const upcomingStartHTML = upcomingStart.length
          ? upcomingStart.map((r) => {
              const d = getDaysLeft(r);
              const label = d === 0 ? "今天" : d === 1 ? "明天" : `${d}天後`;
              return `<div class="dl-item"><span class="dl-tag" style="background:#f0fdf8;color:#059669">${label}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)">${r.task.replace(/【.*?】/g, "").trim().slice(0, 20)}</span><span style="font-size:0.76rem;color:var(--text-muted);flex-shrink:0;font-family:'IBM Plex Mono',monospace">${r.cat.slice(0, 4)}</span></div>`;
            }).join("")
          : '<div style="color:var(--text-muted);font-size:0.88rem;padding:0.3rem 0">近期無即將啟動任務</div>';
        document.getElementById("dashboard-view").innerHTML = `
    <div class="dash-header"><div><h2>📊 專案儀表板</h2><p>自動撈取進度報表</p></div><div style="font-family:'IBM Plex Mono',monospace;font-size:0.8rem;color:var(--text-muted)">更新時間：${new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" })}</div></div>
    ${renderWeeklyActions()}
    <div class="dash-grid">
      <div class="dash-card"><div class="dash-card-title">各分類完成率</div>${catStats.map((s) => `<div class="cat-row"><div class="cat-name" style="color:${CAT_COLORS[s.cat]}">${s.cat}</div><div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${s.pct}%;background:${CAT_COLORS[s.cat]}"></div></div><div class="cat-pct" style="color:${CAT_COLORS[s.cat]}">${s.pct}%</div></div><div style="font-size:0.73rem;color:var(--text-muted);margin:-0.35rem 0 0.6rem 82px;font-family:'IBM Plex Mono',monospace">${s.done}/${s.total} 完成</div>`).join("")}</div>
      <div class="dash-card"><div class="dash-card-title">風險預警</div>
        <div class="risk-block" style="background:#fef2f2;border:1px solid #fca5a5"><div class="risk-num" style="color:#dc2626">${overdueTasks.length}</div><div><div class="risk-label" style="color:#991b1b">🔴 已逾期任務</div><div class="risk-sub" style="color:#dc2626">需立即關注</div></div></div>
        <div class="risk-block" style="background:#fffbeb;border:1px solid #fcd34d;margin-bottom:1rem"><div class="risk-num" style="color:#d97706">${warningTasks.length}</div><div><div class="risk-label" style="color:#92400e">🟠 3天內截止或開跑未動</div><div class="risk-sub" style="color:#d97706">建議提前處理</div></div></div>
        ${overdueHTML}
      </div>
      <div class="dash-card"><div class="dash-card-title">近期截止（14天內）</div>${upcomingHTML}<div class="dash-card-title" style="margin-top:1rem">即將開跑（14天內）</div>${upcomingStartHTML}</div>
    </div>
    <div class="dash-card" style="margin-bottom:1.15rem"><div class="dash-card-title">各分類任務狀態分布</div><div class="cat-status-grid">${catStatusCards}</div></div>`;
      }

      // ──────────────────────────────────────────────────────────────
      // 週報生成
      // ──────────────────────────────────────────────────────────────
      function openWeeklyReport() {
        const now = new Date();
        const dateStr = `${now.getMonth() + 1}/${now.getDate()}`;
        const lines = [];
        lines.push(`【台北有影 3 ｜ ${dateStr} 進度週報】`);
        lines.push("");

        const total = data.length;
        const done = data.filter((r) => r.status === "已完成").length;
        const ongoing = data.filter((r) => r.status === "進行中").length;
        const overdue = data.filter((r) => urgencyLevel(r) === "overdue" && r.status !== "已完成").length;
        const pct = total ? Math.round((done / total) * 100) : 0;
        lines.push(`◆ 整體進度：${done} / ${total}（${pct}%）`);
        lines.push(`◆ 進行中 ${ongoing} 件 ／ 已完成 ${done} 件 ／ 需立即關注 ${overdue} 件`);
        lines.push("");

        const danger = data.filter((r) => urgencyLevel(r) === "overdue" && r.status !== "已完成");
        const warning = data.filter((r) => urgencyLevel(r) === "warning" && r.status !== "已完成");
        if (danger.length || warning.length) {
          lines.push("【需立即關注】");
          danger.forEach((r) => {
            const d = getDaysLeft(r);
            const t = r.task.replace(/【.*?】/g, "").trim();
            lines.push(`🔴 [${r.cat}] ${t}（逾 ${Math.abs(d)} 天）`);
          });
          warning.forEach((r) => {
            const k = getKind(r);
            const ds = getDaysToStart(r);
            const d = getDaysLeft(r);
            let label;
            if (k === "window" && ds >= 0 && ds <= 7) label = "本週開跑";
            else if (k === "window") label = `剩 ${d} 天結束`;
            else label = d === 0 ? "今天截止" : d === 1 ? "明天截止" : `剩 ${d} 天`;
            const t = r.task.replace(/【.*?】/g, "").trim();
            lines.push(`🟠 [${r.cat}] ${t}（${label}）`);
          });
          lines.push("");
        }

        lines.push("【各分類進度】");
        CATS.forEach((c) => {
          const inCat = data.filter((r) => r.cat === c);
          if (!inCat.length) return;
          const d = inCat.filter((r) => r.status === "已完成").length;
          const p = Math.round((d / inCat.length) * 100);
          lines.push(`・${c}：${d} / ${inCat.length}（${p}%）`);
        });
        lines.push("");

        const inProgress = data.filter((r) => r.status === "進行中");
        if (inProgress.length) {
          lines.push("【進行中項目】");
          inProgress.forEach((r) => {
            const t = r.task.replace(/【.*?】/g, "").trim();
            lines.push(`・[${r.cat}] ${r.date} — ${t}`);
          });
          lines.push("");
        }

        const text = lines.join("\n");
        document.getElementById("report-text").value = text;
        document.getElementById("weekly-report-modal").classList.add("active");

        const subj = encodeURIComponent(`【台北有影 3】${dateStr} 進度週報`);
        const body = encodeURIComponent(text);
        document.getElementById("mailto-btn").onclick = () => {
          window.location.href = `mailto:?subject=${subj}&body=${body}`;
        };
      }

      function copyReport() {
        const t = document.getElementById("report-text");
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(t.value)
            .then(() => showToast("已複製週報內容"))
            .catch(() => fallbackCopy(t));
        } else {
          fallbackCopy(t);
        }
      }
      function fallbackCopy(t) {
        t.select();
        try {
          document.execCommand("copy");
          showToast("已複製週報內容");
        } catch (e) {
          showToast("複製失敗，請手動選取");
        }
      }
      function showToast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        clearTimeout(showToast._timer);
        showToast._timer = setTimeout(() => el.classList.remove("show"), 2200);
      }

      // ──────────────────────────────────────────────────────────────
      // 字級調整
      // ──────────────────────────────────────────────────────────────
      let fontSize = parseFloat(localStorage.getItem("tpf3_font") || "1");
      function applyFont() {
        document.documentElement.style.fontSize = `${fontSize * 16}px`;
      }
      function adjustFont(delta) {
        fontSize = Math.max(0.8, Math.min(1.4, fontSize + delta * 0.05));
        try { localStorage.setItem("tpf3_font", fontSize.toString()); } catch (e) {}
        applyFont();
      }
      applyFont();

      // ──────────────────────────────────────────────────────────────
      // Google Sheets 同步
      // ──────────────────────────────────────────────────────────────
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRPxff6kKN3XIazFbgxhotXuUjZYyAhRJ3_t6G-tMTsswdRZ2lD5WKel_WEyM8BrS2/exec";
      let isDirty = false;
      let isEditing = false;

      function clean(s) {
        return s == null ? "" : String(s).trim();
      }

      function parseSheetRow(r) {
        return {
          id: parseInt(r.id) || 0,
          cat: clean(r.cat),
          date: clean(r.date),
          task: clean(r.task),
          unit: clean(r.unit),
          status: clean(r.status) || "待開始",
          note: clean(r.note),
          badge: clean(r.badge),
          comment: clean(r.comment),
          kind: clean(r.kind) || ""
        };
      }

      function hasFullSchedule(rows) {
        return Array.isArray(rows) && rows.some((r) => {
          const date = clean(r.date).replace(/\s/g, "");
          return date.startsWith("12/20") && clean(r.task).includes("春酒");
        });
      }

      // 保留 migration hook，之後若資料欄位規格變更，可在此集中處理。
      function applyOneTimeMigration() {}

      async function loadSaved() {
        try {
          const res = await fetch(SCRIPT_URL);
          if (!res.ok) throw new Error("fetch failed");
          const j = await res.json();
          if (j.rows && Array.isArray(j.rows) && j.rows.length) {
            const savedRows = j.rows.map(parseSheetRow);
            if (hasFullSchedule(savedRows)) {
              data = savedRows;
              nextId = Math.max(...data.map((r) => r.id), 0) + 1;
              if (j.lastUpdated) document.getElementById("last-saved").textContent = j.lastUpdated;
              return;
            }

            // 遠端仍是舊版 49 筆時，直接改用內建完整版，避免畫面停在 12/5。
            console.warn("遠端資料缺少 12/20 任務，已改用內建完整版資料。");
            data = INITIAL_DATA.slice();
            nextId = Math.max(...data.map((r) => r.id), 0) + 1;
            isDirty = true;
            document.getElementById("last-saved").textContent = "已載入完整版，尚未同步";
            showToast("已載入完整版資料，請點儲存同步");
            return;
          }
        } catch (e) {
          console.warn("loadSaved 失敗，改用內建初始資料：", e);
        }
        data = INITIAL_DATA.slice();
        nextId = Math.max(...data.map((r) => r.id), 0) + 1;
      }

      async function saveAll() {
        try {
          const res = await fetch(SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ rows: data })
          });
          if (!res.ok) throw new Error("save failed");
          const j = await res.json().catch(() => ({}));
          const now = new Date().toLocaleString("zh-TW", { hour12: false });
          document.getElementById("last-saved").textContent = j.lastUpdated || now;
          isDirty = false;
          showToast("✓ 已儲存至 Google Sheets");
        } catch (e) {
          showToast("⚠ 儲存失敗，請檢查網路");
          console.error(e);
        }
      }

      // ──────────────────────────────────────────────────────────────
      // 匯出 CSV
      // ──────────────────────────────────────────────────────────────
      function exportCSV() {
        const header = ["id", "分類", "日期", "工作內容", "執行單位", "進度狀態", "備註", "補充說明"];
        const csv = [header.join(",")];
        data.forEach((r) => {
          const row = [r.id, r.cat, r.date, r.task, r.unit, r.status, r.note, r.comment]
            .map((v) => `"${String(v == null ? "" : v).replace(/"/g, '""')}"`)
            .join(",");
          csv.push(row);
        });
        const blob = new Blob(["\uFEFF" + csv.join("\n")], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `taipei-film-3-${new Date().toISOString().slice(0, 10)}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      // ──────────────────────────────────────────────────────────────
      // 鍵盤捷徑 + 編輯狀態追蹤
      // ──────────────────────────────────────────────────────────────
      document.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
          e.preventDefault();
          saveAll();
        }
      });
      document.addEventListener("focusin", (e) => {
        if (e.target.matches && e.target.matches("input, textarea, select")) isEditing = true;
      });
      document.addEventListener("focusout", (e) => {
        if (e.target.matches && e.target.matches("input, textarea, select")) {
          setTimeout(() => { isEditing = false; }, 200);
        }
      });

      // ──────────────────────────────────────────────────────────────
      // 30 秒輪詢同步（編輯中不打擾）
      // ──────────────────────────────────────────────────────────────
      async function pollUpdate() {
        if (isDirty || isEditing) return;
        try {
          const res = await fetch(SCRIPT_URL);
          if (!res.ok) return;
          const j = await res.json();
          if (j.rows && Array.isArray(j.rows) && j.rows.length) {
            const incoming = j.rows.map(parseSheetRow);
            const sig = JSON.stringify(data.map((r) => [r.id, r.status, r.note, r.comment, r.date]));
            const newSig = JSON.stringify(incoming.map((r) => [r.id, r.status, r.note, r.comment, r.date]));
            if (sig !== newSig) {
              data = incoming;
              nextId = Math.max(...data.map((r) => r.id), 0) + 1;
              renderTable();
              if (j.lastUpdated) document.getElementById("last-saved").textContent = j.lastUpdated;
            }
          }
        } catch (e) {
          console.warn("poll error", e);
        }
      }

      // ──────────────────────────────────────────────────────────────
      // 啟動
      // ──────────────────────────────────────────────────────────────
      (async () => {
        await loadSaved();
        applyOneTimeMigration();
        renderTable();
        setInterval(pollUpdate, 30000);
      })();
    </script>
  </body>
</html>
