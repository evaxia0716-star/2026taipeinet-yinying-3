<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台北有影 3｜2026 專案進度追蹤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0faf8;
  --surface: #ffffff;
  --surface2: #e6f5f2;
  --border: #c8e6e0;
  --border2: #a8d5cc;
  --accent: #0d9488;
  --accent-hover: #0f766e;
  --text: #1a3330;
  --text-dim: #3d5c57;
  --text-muted: #5f8a84;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; }
body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* HEADER */
header {
  position:sticky; top:0; z-index:100;
  background:#134e4a; padding:0 2rem;
  display:flex; align-items:center; justify-content:space-between;
  height:68px; box-shadow:0 2px 12px rgba(13,74,70,0.25);
}
.header-left { display:flex; align-items:center; gap:1.5rem; }
.logo { font-family:'IBM Plex Mono',monospace; font-size:0.72rem; letter-spacing:0.2em; color:#5eead4; text-transform:uppercase; }
.project-title { font-size:1.1rem; font-weight:700; color:#ffffff; }
.project-title .year { color:#99f6e4; font-size:0.9rem; font-weight:400; margin-left:0.5rem; }
.header-right { display:flex; align-items:center; gap:0.6rem; }
.font-ctrl { display:flex; gap:0.3rem; }

.btn {
  display:inline-flex; align-items:center; gap:0.4rem;
  padding:0.45rem 1rem; border-radius:8px;
  border:1px solid rgba(255,255,255,0.22); background:rgba(255,255,255,0.12);
  color:#e0fdf4; font-family:'Noto Sans TC',sans-serif; font-size:0.88rem;
  cursor:pointer; transition:all 0.15s; text-decoration:none;
}
.btn:hover { background:rgba(255,255,255,0.24); color:#fff; }
.btn-accent { background:#0d9488; border-color:#0d9488; color:#fff; font-weight:700; box-shadow:0 2px 6px rgba(13,148,136,0.4); }
.btn-accent:hover { background:#0f766e; border-color:#0f766e; }
.font-btn { padding:0.35rem 0.65rem; font-size:0.82rem; font-weight:700; }

/* STATS */
.stats-bar { background:#fff; border-bottom:1px solid var(--border); padding:0.9rem 2rem; display:flex; align-items:center; gap:2.2rem; overflow-x:auto; }
.stat-item { display:flex; align-items:center; gap:0.5rem; white-space:nowrap; }
.stat-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.stat-label { font-size:0.9rem; color:var(--text-dim); font-weight:500; }
.stat-val { font-family:'IBM Plex Mono',monospace; font-size:1.05rem; font-weight:700; color:var(--text); }

/* PROGRESS */
.progress-section { background:#fff; border-bottom:1px solid var(--border); padding:0.9rem 2rem; display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; }
.progress-label { font-size:0.9rem; color:var(--text-dim); font-weight:600; white-space:nowrap; }
.progress-bar-wrap { flex:1; min-width:180px; height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; }
.progress-bar-fill { height:100%; background:linear-gradient(90deg,#0d9488,#059669); border-radius:4px; transition:width 0.4s; }
.progress-pct { font-family:'IBM Plex Mono',monospace; font-size:1.05rem; font-weight:700; color:var(--accent); }

/* TOOLBAR */
.toolbar { background:#fff; border-bottom:2px solid var(--border); padding:0.85rem 2rem; display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap; }
.filter-label { font-size:0.9rem; color:var(--text-dim); font-weight:700; }
.filter-btn {
  padding:0.4rem 1rem; border-radius:20px; border:1.5px solid var(--border2);
  background:#fff; color:var(--text-dim); font-family:'Noto Sans TC',sans-serif;
  font-size:0.88rem; cursor:pointer; transition:all 0.15s; font-weight:500;
}
.filter-btn:hover { border-color:var(--accent); color:var(--accent); background:#f0faf8; }
.filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
.filter-btn[data-cat="行政準備"].active { background:#2563eb; border-color:#2563eb; }
.filter-btn[data-cat="影片徵選"].active { background:#7c3aed; border-color:#7c3aed; }
.filter-btn[data-cat="頒獎典禮"].active { background:#b45309; border-color:#b45309; }
.filter-btn[data-cat="市民大聲說"].active { background:#059669; border-color:#059669; }
.filter-btn[data-cat="人才培訓"].active { background:#be185d; border-color:#be185d; }

.toolbar-right { margin-left:auto; display:flex; align-items:center; gap:0.6rem; }
.add-task-btn {
  display:inline-flex; align-items:center; gap:0.4rem;
  padding:0.48rem 1.15rem; border-radius:8px;
  background:var(--accent); border:none; color:#fff;
  font-family:'Noto Sans TC',sans-serif; font-size:0.92rem; font-weight:700;
  cursor:pointer; transition:all 0.15s; box-shadow:0 2px 6px rgba(13,148,136,0.3);
}
.add-task-btn:hover { background:var(--accent-hover); box-shadow:0 3px 10px rgba(13,148,136,0.4); }

.view-toggle { display:flex; border:1.5px solid var(--border2); border-radius:8px; overflow:hidden; }
.view-btn { padding:0.4rem 0.95rem; border:none; background:transparent; color:var(--text-dim); font-family:'Noto Sans TC',sans-serif; font-size:0.88rem; cursor:pointer; transition:all 0.15s; font-weight:500; }
.view-btn.active { background:var(--accent); color:#fff; font-weight:700; }
.view-btn:hover:not(.active) { background:var(--surface2); color:var(--text); }

.search-wrap { position:relative; }
.search-input { background:#fff; border:1.5px solid var(--border2); border-radius:8px; padding:0.42rem 0.85rem 0.42rem 2.1rem; color:var(--text); font-family:'Noto Sans TC',sans-serif; font-size:0.9rem; width:210px; outline:none; transition:all 0.15s; }
.search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(13,148,136,0.12); }
.search-input::placeholder { color:var(--text-muted); }
.search-icon { position:absolute; left:0.6rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.85rem; pointer-events:none; }

/* TABLE */
.table-wrap { overflow-x:auto; padding:0 2rem 5rem; }
table { width:100%; border-collapse:collapse; margin-top:1rem; font-size:0.97rem; }
thead th {
  padding:0.75rem 0.9rem; text-align:left; font-size:0.8rem; font-weight:700;
  letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim);
  border-bottom:2px solid var(--border); white-space:nowrap;
  position:sticky; top:69px; background:var(--bg); z-index:10;
}
thead th:first-child { padding-left:0; }
.col-group { width:100px; } .col-date { width:120px; } .col-task { min-width:300px; }
.col-unit { width:180px; } .col-status { width:128px; } .col-note { min-width:260px; } .col-actions { width:50px; }

tbody tr { border-bottom:1px solid var(--border); transition:background 0.1s; }
tbody tr:hover { background:#f0fdf8; }
tbody tr.hidden { display:none; }
tbody td { padding:0.95rem 0.9rem; vertical-align:top; }
tbody td:first-child { padding-left:0; }

.group-tag { display:inline-flex; align-items:center; padding:0.28rem 0.7rem; border-radius:5px; font-size:0.82rem; font-weight:700; white-space:nowrap; }
.tag-行政準備 { background:#dbeafe; color:#1e40af; border:1.5px solid #93c5fd; }
.tag-影片徵選 { background:#ede9fe; color:#5b21b6; border:1.5px solid #c4b5fd; }
.tag-頒獎典禮 { background:#fef3c7; color:#92400e; border:1.5px solid #fcd34d; }
.tag-市民大聲說 { background:#d1fae5; color:#065f46; border:1.5px solid #6ee7b7; }
.tag-人才培訓 { background:#fce7f3; color:#9d174d; border:1.5px solid #f9a8d4; }

.date-text { font-family:'IBM Plex Mono',monospace; font-size:0.9rem; color:var(--text-dim); font-weight:600; }
.task-content { line-height:1.65; color:var(--text); }
.task-badge { display:inline-block; font-size:0.75rem; padding:0.12rem 0.42rem; border-radius:3px; margin-bottom:0.35rem; font-weight:700; letter-spacing:0.04em; }
.badge-new { background:#dbeafe; color:#1e40af; border:1px solid #93c5fd; }
.badge-warn { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
.badge-tip { background:#fef9c3; color:#854d0e; border:1px solid #fde047; }
.task-editable { cursor:text; outline:none; display:block; }
.task-editable:focus { background:#f0fdf8; border-radius:4px; outline:1.5px solid var(--accent); padding:0.2rem 0.4rem; margin:-0.2rem -0.4rem; }
.unit-text { font-size:0.9rem; color:var(--text-dim); }

.status-select { appearance:none; background:transparent; border:1.5px solid; border-radius:20px; padding:0.3rem 0.75rem; font-family:'Noto Sans TC',sans-serif; font-size:0.88rem; font-weight:600; cursor:pointer; outline:none; transition:all 0.15s; }
.status-待開始 { color:#455a64; border-color:#90a4ae; background:#f5f7f8; }
.status-進行中 { color:#01579b; border-color:#29b6f6; background:#e1f5fe; }
.status-已完成 { color:#1b5e20; border-color:#66bb6a; background:#e8f5e9; }
.status-待確認 { color:#bf360c; border-color:#ffa726; background:#fff3e0; }
.status-延遲 { color:#b71c1c; border-color:#ef9a9a; background:#ffebee; }

.note-cell { display:flex; flex-direction:column; gap:0.5rem; }
.note-original { font-size:0.9rem; color:var(--text-dim); line-height:1.55; }
.note-comment {
  background:#fffde7; border-left:3px solid #f59e0b; border-radius:0 6px 6px 0;
  padding:0.6rem 0.75rem; font-size:0.9rem; color:var(--text); line-height:1.6;
  min-height:3.5rem; outline:none; transition:all 0.15s; font-family:'Noto Sans TC',sans-serif;
}
.note-comment:focus { background:#fff9c4; border-left-color:#d97706; }
.note-comment:empty::before { content:attr(data-placeholder); color:var(--text-muted); }

.row-actions { display:flex; opacity:0; transition:opacity 0.15s; }
tr:hover .row-actions { opacity:1; }
.action-btn { width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:5px; border:1px solid var(--border); background:#fff; color:var(--text-muted); cursor:pointer; font-size:0.82rem; transition:all 0.15s; }
.action-btn:hover { border-color:#fca5a5; color:#dc2626; background:#fef2f2; }

.month-divider td { padding:1.75rem 0.9rem 0.55rem; background:var(--bg)!important; }
.month-label { font-family:'IBM Plex Mono',monospace; font-size:0.75rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dim); font-weight:700; padding:0.3rem 0.75rem; border:1.5px solid var(--border2); border-radius:5px; background:#fff; display:inline-block; }

/* CALENDAR */
#calendar-view { padding:0 2rem 5rem; }
.cal-nav { display:flex; align-items:center; justify-content:space-between; padding:1.5rem 0 1rem; }
.cal-nav .btn { background:#fff; color:var(--text); border:1.5px solid var(--border2); }
.cal-nav .btn:hover { border-color:var(--accent); color:var(--accent); background:#f0faf8; }
.cal-title { font-size:1.25rem; font-weight:700; color:var(--text); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.cal-day-header { background:#134e4a; color:#99f6e4; padding:0.65rem; text-align:center; font-size:0.85rem; font-weight:700; }
.cal-day { background:#fff; min-height:115px; padding:0.65rem; }
.cal-day.empty { background:#f5faf8; }
.cal-day.today { background:#f0fdf8; }
.cal-day-num { font-family:'IBM Plex Mono',monospace; font-size:0.9rem; font-weight:700; color:var(--text-dim); margin-bottom:0.45rem; }
.cal-day.today .cal-day-num { color:var(--accent); font-weight:900; }
.cal-task-chip { display:block; font-size:0.78rem; padding:0.2rem 0.48rem; border-radius:4px; margin-bottom:0.28rem; line-height:1.4; cursor:pointer; transition:opacity 0.12s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600; }
.cal-task-chip:hover { opacity:0.7; }
.cal-more { font-size:0.78rem; color:var(--text-muted); cursor:pointer; margin-top:0.15rem; font-weight:600; }
.cal-legend { display:flex; gap:0.85rem; margin-top:1.1rem; flex-wrap:wrap; }
.cal-leg-dot { display:inline-block; padding:0.13rem 0.5rem; border-radius:4px; font-size:0.8rem; font-weight:600; }

/* MODALS */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(15,40,35,0.45); backdrop-filter:blur(3px); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.active { display:flex; }
.modal { background:#fff; border:1px solid var(--border); border-radius:14px; padding:2.1rem; width:530px; max-width:93vw; box-shadow:0 20px 60px rgba(0,0,0,0.18); }
.modal h3 { font-size:1.08rem; margin-bottom:1.3rem; color:var(--text); font-weight:700; }
.form-group { margin-bottom:1.05rem; }
.form-label { display:block; font-size:0.85rem; color:var(--text-dim); margin-bottom:0.4rem; font-weight:700; }
.form-input,.form-select,.form-textarea { width:100%; background:#f8faf9; border:1.5px solid var(--border2); border-radius:7px; padding:0.58rem 0.88rem; color:var(--text); font-family:'Noto Sans TC',sans-serif; font-size:0.95rem; outline:none; transition:all 0.15s; }
.form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(13,148,136,0.12); background:#fff; }
.form-select { cursor:pointer; }
.form-textarea { resize:vertical; min-height:90px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:0.9rem; }
.modal-actions { display:flex; justify-content:flex-end; gap:0.75rem; margin-top:1.5rem; }
.btn-cancel { background:#fff; color:var(--text-dim); border:1.5px solid var(--border2); }
.btn-cancel:hover { border-color:var(--accent); color:var(--accent); background:#f0faf8; }

/* TOAST */
.toast { position:fixed; bottom:2rem; right:2rem; background:#134e4a; color:#fff; border-radius:8px; padding:0.85rem 1.4rem; font-size:0.92rem; z-index:2000; transform:translateX(130%); transition:transform 0.25s; box-shadow:0 4px 16px rgba(13,74,70,0.3); }
.toast.show { transform:translateX(0); }

@media print {
  header,.stats-bar,.toolbar,.progress-section,.row-actions,.modal-overlay,.toast { display:none!important; }
  body { background:white; }
  .table-wrap { padding:0; }
}
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">PAC · 公用頻道</div>
    <div class="project-title">台北有影 3<span class="year">2026 專案進度追蹤</span></div>
  </div>
  <div class="header-right">
    <div class="font-ctrl">
      <button class="btn font-btn" onclick="adjustFont(-1)">A－</button>
      <button class="btn font-btn" onclick="adjustFont(1)">A＋</button>
    </div>
    <button class="btn" onclick="exportCSV()">⬇ 匯出</button>
    <button class="btn" onclick="window.print()">⎙ 列印</button>
    <button class="btn btn-accent" onclick="saveAll()">✓ 儲存</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-dot" style="background:#90a4ae"></div><span class="stat-label">待開始</span><span class="stat-val" id="stat-pending">—</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#29b6f6"></div><span class="stat-label">進行中</span><span class="stat-val" id="stat-ongoing">—</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#66bb6a"></div><span class="stat-label">已完成</span><span class="stat-val" id="stat-done">—</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#ffa726"></div><span class="stat-label">待確認</span><span class="stat-val" id="stat-confirm">—</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#ef9a9a"></div><span class="stat-label">延遲</span><span class="stat-val" id="stat-late">—</span></div>
  <div class="stat-item" style="margin-left:auto;"><span class="stat-label">最後同步：</span><span class="stat-val" id="last-saved" style="font-size:0.88rem;color:var(--text-muted)">尚未儲存</span></div>
</div>

<div class="progress-section">
  <span class="progress-label">整體完成度</span>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  <span class="progress-pct" id="progress-pct">0%</span>
</div>

<div class="toolbar">
  <span class="filter-label">篩選：</span>
  <button class="filter-btn active" data-cat="全部" onclick="filterCat(this)">全部</button>
  <button class="filter-btn" data-cat="行政準備" onclick="filterCat(this)">行政準備</button>
  <button class="filter-btn" data-cat="影片徵選" onclick="filterCat(this)">影片徵選</button>
  <button class="filter-btn" data-cat="頒獎典禮" onclick="filterCat(this)">頒獎典禮</button>
  <button class="filter-btn" data-cat="市民大聲說" onclick="filterCat(this)">市民大聲說</button>
  <button class="filter-btn" data-cat="人才培訓" onclick="filterCat(this)">人才培訓</button>
  <div class="toolbar-right">
    <button class="add-task-btn" onclick="openAddModal()">＋ 新增任務</button>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-list" onclick="switchView('list')">☰ 清單</button>
      <button class="view-btn" id="btn-cal" onclick="switchView('calendar')">▦ 行事曆</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="搜尋工作內容…" oninput="searchTable(this.value)">
    </div>
  </div>
</div>

<div class="table-wrap" id="table-view">
  <table><thead><tr>
    <th class="col-group">分類</th><th class="col-date">日期</th>
    <th class="col-task">工作內容</th><th class="col-unit">執行單位</th>
    <th class="col-status">進度狀態</th><th class="col-note">備註 ／ 補充說明</th><th class="col-actions"></th>
  </tr></thead><tbody id="table-body"></tbody></table>
</div>

<div id="calendar-view" style="display:none;">
  <div class="cal-nav">
    <button class="btn" onclick="calPrev()">← 上個月</button>
    <span class="cal-title" id="cal-title"></span>
    <button class="btn" onclick="calNext()">下個月 →</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-legend">
    <span><span class="cal-leg-dot" style="background:#dbeafe;color:#1e40af;border:1px solid #93c5fd">行政準備</span></span>
    <span><span class="cal-leg-dot" style="background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd">影片徵選</span></span>
    <span><span class="cal-leg-dot" style="background:#fef3c7;color:#92400e;border:1px solid #fcd34d">頒獎典禮</span></span>
    <span><span class="cal-leg-dot" style="background:#d1fae5;color:#065f46;border:1px solid #6ee7b7">市民大聲說</span></span>
    <span><span class="cal-leg-dot" style="background:#fce7f3;color:#9d174d;border:1px solid #f9a8d4">人才培訓</span></span>
  </div>
</div>

<!-- 行事曆任務快速編輯 -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <h3 id="task-modal-title" style="line-height:1.5"></h3>
    <div style="font-size:0.88rem;color:var(--text-muted);margin-top:-0.75rem;margin-bottom:1.3rem" id="task-modal-meta"></div>
    <div class="form-group">
      <label class="form-label">進度狀態</label>
      <select class="form-select" id="tm-status">
        <option>待開始</option><option>進行中</option><option>已完成</option><option>待確認</option><option>延遲</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">補充說明</label>
      <textarea class="form-textarea" id="tm-comment" placeholder="在這裡新增說明、備忘、聯絡事項…" rows="4"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeTaskModal()">取消</button>
      <button class="btn btn-accent" onclick="saveTaskModal()">儲存更新</button>
    </div>
  </div>
</div>

<!-- 新增任務 -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>新增任務</h3>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">分類</label>
        <select class="form-select" id="m-cat">
          <option>行政準備</option><option>影片徵選</option><option>頒獎典禮</option><option>市民大聲說</option><option>人才培訓</option>
        </select>
      </div>
      <div class="form-group">

let data=[], nextId=100, currentFilter='全部', currentSearch='', currentView='list';
const MONTHS_ZH=['','一','二','三','四','五','六','七','八','九','十','十一','十二'];

// ── RENDER ──
function renderTable(){
  const tbody=document.getElementById('table-body');
  tbody.innerHTML='';
  let lastM=null;
  data.forEach(row=>{
    const m=parseInt(row.date.split('/')[0]);
    if(m!==lastM){
      const tr=document.createElement('tr');
      tr.className='month-divider'; tr.dataset.month=m;
      tr.innerHTML=`<td colspan="7"><span class="month-label">${MONTHS_ZH[m]||m}月</span></td>`;
      tbody.appendChild(tr); lastM=m;
    }
    const badge=row.badge==='new'?'<span class="task-badge badge-new">NEW</span><br>':
      row.badge==='warn'?'<span class="task-badge badge-warn">⚠ 注意</span><br>':
      row.badge==='tip'?'<span class="task-badge badge-tip">💡 建議</span><br>':'';
    const tr=document.createElement('tr');
    tr.dataset.id=row.id; tr.dataset.cat=row.cat;
    tr.innerHTML=`
      <td><span class="group-tag tag-${row.cat}">${row.cat}</span></td>
      <td><div class="date-text">${row.date}</div></td>
      <td><div class="task-content">${badge}<span class="task-editable" contenteditable="true" data-field="task" data-id="${row.id}">${row.task}</span></div></td>
      <td><span class="task-editable unit-text" contenteditable="true" data-field="unit" data-id="${row.id}">${row.unit}</span></td>
      <td><select class="status-select status-${row.status}" data-id="${row.id}" onchange="changeStatus(this,${row.id})">
        <option ${row.status==='待開始'?'selected':''}>待開始</option>
        <option ${row.status==='進行中'?'selected':''}>進行中</option>
        <option ${row.status==='已完成'?'selected':''}>已完成</option>
        <option ${row.status==='待確認'?'selected':''}>待確認</option>
        <option ${row.status==='延遲'?'selected':''}>延遲</option>
      </select></td>
      <td><div class="note-cell">
        ${row.note?`<div class="note-original">${row.note}</div>`:''}
        <div class="note-comment" contenteditable="true" data-field="comment" data-id="${row.id}" data-placeholder="點此新增說明、備忘…">${row.comment||''}</div>
      </div></td>
      <td><div class="row-actions"><div class="action-btn" onclick="deleteRow(${row.id})">✕</div></div></td>`;
    tbody.appendChild(tr);
  });
  tbody.querySelectorAll('[contenteditable]').forEach(el=>{
    el.addEventListener('blur',()=>{
      const row=data.find(r=>r.id===parseInt(el.dataset.id));
      if(row) row[el.dataset.field]=el.innerText.trim();
    });
  });
  applyFilter();
  updateStats();
}

// ── FILTER（修正：狀態持久化，每次 render 後重套）──
function filterCat(btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter=btn.dataset.cat;
  applyFilter();
}
function searchTable(val){ currentSearch=val.toLowerCase(); applyFilter(); }
function applyFilter(){
  document.querySelectorAll('#table-body tr:not(.month-divider)').forEach(tr=>{
    const ok=(currentFilter==='全部'||tr.dataset.cat===currentFilter)&&
              (!currentSearch||tr.textContent.toLowerCase().includes(currentSearch));
    tr.classList.toggle('hidden',!ok);
  });
  document.querySelectorAll('#table-body tr.month-divider').forEach(div=>{
    let nxt=div.nextElementSibling, vis=false;
    while(nxt&&!nxt.classList.contains('month-divider')){
      if(!nxt.classList.contains('hidden')){vis=true;break;}
      nxt=nxt.nextElementSibling;
    }
    div.classList.toggle('hidden',!vis);
  });
}

function changeStatus(sel,id){
  const row=data.find(r=>r.id===id);
  if(row){row.status=sel.value; sel.className=`status-select status-${sel.value}`; updateStats();}
}
function updateStats(){
  const c={'待開始':0,'進行中':0,'已完成':0,'待確認':0,'延遲':0};
  data.forEach(r=>{if(c[r.status]!==undefined)c[r.status]++;});
  ['pending','ongoing','done','confirm','late'].forEach((k,i)=>{
    document.getElementById('stat-'+k).textContent=Object.values(c)[i];
  });
  const pct=data.length?Math.round(c['已完成']/data.length*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
}
function deleteRow(id){
  if(!confirm('確定刪除此任務？'))return;
  data=data.filter(r=>r.id!==id); renderTable(); showToast('已刪除任務');
}

// ── ADD MODAL ──
function openAddModal(){ document.getElementById('add-modal').classList.add('active'); }
function closeModal(){ document.getElementById('add-modal').classList.remove('active'); }
function submitModal(){
  const date=document.getElementById('m-date').value.trim();
  const task=document.getElementById('m-task').value.trim();
  if(!date||!task){alert('請填寫日期與工作內容');return;}
  data.push({id:nextId++,cat:document.getElementById('m-cat').value,date,task,
    unit:document.getElementById('m-unit').value.trim(),
    status:document.getElementById('m-status').value,
    note:document.getElementById('m-note').value.trim(),badge:'',comment:''});
  data.sort((a,b)=>{const p=s=>parseInt(s.split(/[\/\-–]/)[0]||0)*100+parseInt((s.split(/[\/\-–]/)[1]||0));return p(a.date)-p(b.date);});
  closeModal(); renderTable();
  if(currentView==='calendar')renderCalendar();
  showToast('已新增任務 ✓');
}
document.getElementById('add-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── TASK QUICK EDIT ──
let taskModalId=null;
function openTaskModal(id){
  const row=data.find(r=>r.id===id); if(!row)return;
  taskModalId=id;
  document.getElementById('task-modal-title').textContent=row.task;
  document.getElementById('task-modal-meta').textContent=`${row.cat} · ${row.date} · ${row.unit}`;
  document.getElementById('tm-status').value=row.status;
  document.getElementById('tm-comment').value=row.comment||'';
  document.getElementById('task-modal').classList.add('active');
}
function closeTaskModal(){ document.getElementById('task-modal').classList.remove('active'); taskModalId=null; }
function saveTaskModal(){
  if(!taskModalId)return;
  const row=data.find(r=>r.id===taskModalId); if(!row)return;
  row.status=document.getElementById('tm-status').value;
  row.comment=document.getElementById('tm-comment').value.trim();
  closeTaskModal(); renderTable();
  if(currentView==='calendar')renderCalendar();
  showToast('已更新，記得按「儲存」同步');
}
document.getElementById('task-modal').addEventListener('click',function(e){if(e.target===this)closeTaskModal();});

// ── VIEW ──
function switchView(view){
  currentView=view;
  document.getElementById('btn-list').classList.toggle('active',view==='list');
  document.getElementById('btn-cal').classList.toggle('active',view==='calendar');
  document.getElementById('table-view').style.display=view==='list'?'':'none';
  document.getElementById('calendar-view').style.display=view==='calendar'?'':'none';
  if(view==='calendar')renderCalendar();
}

    '市民大聲說':'background:#d1fae5;border:1px solid #6ee7b7;color:#065f46',
    '人才培訓':'background:#fce7f3;border:1px solid #f9a8d4;color:#9d174d',
  })[cat]||'background:#f0f4f4;color:#3d5c57';
}
function renderCalendar(){
  document.getElementById('cal-title').textContent=`${calYear} 年　${CAL_MONTH_ZH[calMonth]}月`;
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  const byDay={};
  data.forEach(r=>{const d=parseDateFirst(r.date);if(d&&d.month===calMonth+1){if(!byDay[d.day])byDay[d.day]=[];byDay[d.day].push(r);}});
  let h=CAL_DAY.map(d=>`<div class="cal-day-header">${d}</div>`).join('');
  for(let i=0;i<first;i++)h+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    const tasks=byDay[d]||[], show=tasks.slice(0,3), more=tasks.length-3;
    const chips=show.map(t=>`<span class="cal-task-chip" style="${chipStyle(t.cat)}" onclick="openTaskModal(${t.id})" title="${t.task}">${t.task.replace(/【.*?】/g,'').trim().slice(0,14)}</span>`).join('');
    const moreBtn=more>0?`<div class="cal-more" onclick="switchView('list')">+${more} 項</div>`:'';
    h+=`<div class="cal-day${isToday?' today':''}"><div class="cal-day-num">${d}</div>${chips}${moreBtn}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=h;
}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}

// ── FONT ──
let fontSize=parseInt(localStorage.getItem('tbff3_font')||'16');
function applyFont(){document.documentElement.style.fontSize=fontSize+'px';}
function adjustFont(d){fontSize=Math.min(22,Math.max(12,fontSize+d));localStorage.setItem('tbff3_font',fontSize);applyFont();showToast('字體：'+fontSize+'px');}
applyFont();

// ── SYNC ──
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyRPxff6kKN3XIazFbgxhotXuUjZYyAhRJ3_t6G-tMTsswdRZ2lD5WKel_WEyM8BrS2/exec';
function syncFields(){document.querySelectorAll('[contenteditable]').forEach(el=>{const row=data.find(r=>r.id===parseInt(el.dataset.id));if(row)row[el.dataset.field]=el.innerText.trim();});}

async function saveAll(){
  syncFields();
  const btn=document.querySelector('.btn-accent'), orig=btn.textContent;
  btn.textContent='同步中…'; btn.disabled=true;
  try{
    const res=await fetch(`${SCRIPT_URL}?action=write&data=${encodeURIComponent(JSON.stringify(data))}`);
    const json=await res.json();
    if(json.ok){
      const n=new Date();
      document.getElementById('last-saved').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
      localStorage.setItem('tbff3_data',JSON.stringify(data));
      showToast('已同步至 Google Sheets ✓');
    }else throw new Error();
  }catch{
    localStorage.setItem('tbff3_data',JSON.stringify(data));
    showToast('⚠ 同步失敗，已儲存至本機');
  }finally{btn.textContent=orig;btn.disabled=false;}
}

async function loadSaved(){
  document.getElementById('table-body').innerHTML='<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--text-muted)">從 Google Sheets 載入中…</td></tr>';
  try{
    const res=await fetch(SCRIPT_URL+'?action=read');
    const remote=await res.json();
    if(Array.isArray(remote)&&remote.length>0){
      data=remote.map(r=>({id:parseInt(r.id)||Math.random(),cat:r.cat||'',date:r.date||'',task:r.task||'',unit:r.unit||'',status:r.status||'待開始',note:r.note||'',badge:r.badge||'',comment:r.comment||''}));
      nextId=Math.max(...data.map(r=>typeof r.id==='number'?r.id:0))+1;
      document.getElementById('last-saved').textContent='已從雲端載入';
    }else{data=JSON.parse(JSON.stringify(INITIAL_DATA));await saveAll();}
  }catch{
    const local=localStorage.getItem('tbff3_data');
    data=local?JSON.parse(local):JSON.parse(JSON.stringify(INITIAL_DATA));
    if(data.length)nextId=Math.max(...data.map(r=>r.id||0))+1;
    document.getElementById('last-saved').textContent='（離線備份）';
    showToast('⚠ 無法連線，顯示本機備份');
  }
}

function exportCSV(){
  syncFields();
  const h=['分類','日期','工作內容','執行單位','進度狀態','備註','補充說明'];
  const csv='\uFEFF'+[h,...data.map(r=>[r.cat,r.date,r.task,r.unit,r.status,r.note,r.comment])].map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='台北有影3_進度表.csv'; a.click(); showToast('CSV 匯出成功');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveAll();}});

(async()=>{await loadSaved();renderTable();})();
</script>
