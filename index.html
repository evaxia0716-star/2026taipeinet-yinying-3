<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台北有影 3｜2026 專案進度追蹤</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0faf8; --surface: #ffffff; --surface2: #e6f5f2;
      --border: #c8e6e0; --border2: #a8d5cc;
      --accent: #0d9488; --accent-hover: #0f766e;
      --text: #1a3330; --text-dim: #3d5c57; --text-muted: #5f8a84;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }
    body { font-family: "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { position: sticky; top: 0; z-index: 100; background: #134e4a; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 68px; box-shadow: 0 2px 12px rgba(13,74,70,0.25); }
    .header-left { display: flex; align-items: center; gap: 1.5rem; }
    .logo { font-family: "IBM Plex Mono", monospace; font-size: 0.72rem; letter-spacing: 0.2em; color: #5eead4; text-transform: uppercase; }
    .project-title { font-size: 1.1rem; font-weight: 700; color: #fff; }
    .project-title .year { color: #99f6e4; font-size: 0.9rem; font-weight: 400; margin-left: 0.5rem; }
    .header-right { display: flex; align-items: center; gap: 0.6rem; }
    .font-ctrl { display: flex; gap: 0.3rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.45rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.22); background: rgba(255,255,255,0.12); color: #e0fdf4; font-family: "Noto Sans TC", sans-serif; font-size: 0.88rem; cursor: pointer; transition: all 0.15s; text-decoration: none; }
    .btn:hover { background: rgba(255,255,255,0.24); color: #fff; }
    .btn-accent { background: #0d9488; border-color: #0d9488; color: #fff; font-weight: 700; box-shadow: 0 2px 6px rgba(13,148,136,0.4); }
    .btn-accent:hover { background: #0f766e; border-color: #0f766e; }
    .btn-accent:disabled { opacity: .55; cursor: not-allowed; }
    .font-btn { padding: 0.35rem 0.65rem; font-size: 0.82rem; font-weight: 700; }
    .stats-bar { background: #fff; border-bottom: 1px solid var(--border); padding: 0.9rem 2rem; display: flex; align-items: center; gap: 2.2rem; overflow-x: auto; }
    .stat-item { display: flex; align-items: center; gap: 0.5rem; white-space: nowrap; }
    .stat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .stat-label { font-size: 0.9rem; color: var(--text-dim); font-weight: 500; }
    .stat-val { font-family: "IBM Plex Mono", monospace; font-size: 1.05rem; font-weight: 700; color: var(--text); }
    .progress-section { background: #fff; border-bottom: 1px solid var(--border); padding: 0.9rem 2rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
    .progress-label { font-size: 0.9rem; color: var(--text-dim); font-weight: 600; white-space: nowrap; }
    .progress-bar-wrap { flex: 1; min-width: 180px; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #0d9488, #059669); border-radius: 4px; transition: width 0.4s; }
    .progress-pct { font-family: "IBM Plex Mono", monospace; font-size: 1.05rem; font-weight: 700; color: var(--accent); }
    .toolbar { background: #fff; border-bottom: 2px solid var(--border); padding: 0.55rem 2rem; display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
    .filter-label { font-size: 0.88rem; color: var(--text-dim); font-weight: 700; margin-right: 0.1rem; }
    .filter-btn { padding: 0.3rem 0.7rem; border-radius: 20px; border: 1.5px solid var(--border2); background: #fff; color: var(--text-dim); font-family: "Noto Sans TC", sans-serif; font-size: 0.84rem; cursor: pointer; transition: all 0.15s; font-weight: 500; }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: #f0faf8; }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
    .filter-btn[data-cat="行政準備"].active { background: #2563eb; border-color: #2563eb; }
    .filter-btn[data-cat="影片徵選"].active { background: #7c3aed; border-color: #7c3aed; }
    .filter-btn[data-cat="頒獎典禮"].active { background: #b45309; border-color: #b45309; }
    .filter-btn[data-cat="市民大聲說"].active { background: #059669; border-color: #059669; }
    .filter-btn[data-cat="人才培訓"].active { background: #be185d; border-color: #be185d; }
    /* ── 已完成頁籤專屬色 ── */
    .filter-btn[data-cat="已完成"].active { background: #475569; border-color: #475569; }
    /* ── 收折按鈕 active 狀態 ── */
    .filter-btn#toggle-done-btn.active { background: #475569; border-color: #475569; color: #fff; }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 0.35rem; }
    .add-task-btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.48rem 1.15rem; border-radius: 8px; background: var(--accent); border: none; color: #fff; font-family: "Noto Sans TC", sans-serif; font-size: 0.92rem; font-weight: 700; cursor: pointer; transition: all 0.15s; box-shadow: 0 2px 6px rgba(13,148,136,0.3); }
    .add-task-btn:hover { background: var(--accent-hover); }
    .view-toggle { display: flex; border: 1.5px solid var(--border2); border-radius: 8px; overflow: hidden; }
    .view-btn { padding: 0.4rem 0.95rem; border: none; background: transparent; color: var(--text-dim); font-family: "Noto Sans TC", sans-serif; font-size: 0.88rem; cursor: pointer; transition: all 0.15s; font-weight: 500; }
    .view-btn.active { background: var(--accent); color: #fff; font-weight: 700; }
    .view-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }
    .search-wrap { position: relative; }
    .search-input { background: #fff; border: 1.5px solid var(--border2); border-radius: 8px; padding: 0.42rem 0.85rem 0.42rem 2.1rem; color: var(--text); font-family: "Noto Sans TC", sans-serif; font-size: 0.9rem; width: 210px; outline: none; transition: all 0.15s; }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(13,148,136,0.12); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-icon { position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.85rem; pointer-events: none; }
    .table-wrap { overflow-x: auto; padding: 0 2rem 5rem; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 1rem; font-size: 0.97rem; }
    thead th { padding: 0.75rem 0.9rem; text-align: left; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); border-bottom: 2px solid var(--border); white-space: nowrap; position: sticky; top: 68px; background: var(--bg); z-index: 30; }
    thead th:first-child { padding-left: 0; }
    .col-group{width:100px}.col-date{width:120px}.col-task{min-width:280px}.col-unit{width:160px}.col-status{width:128px}.col-note{min-width:240px}.col-actions{width:50px}
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: #f0fdf8; }
    tbody tr.hidden { display: none; }
    tbody td { padding: 0.95rem 0.9rem; vertical-align: top; }
    tbody td:first-child { padding-left: 0; }
    tbody tr.row-overdue { background: #fff5f5; }
    tbody tr.row-overdue:hover { background: #fee8e8; }
    tbody tr.row-warning { background: #fffdf0; }
    tbody tr.row-warning:hover { background: #fef9c3; }

    /* ── 已完成任務淡化 ── */
    tbody tr.row-done { opacity: 0.42; transition: opacity 0.2s; }
    tbody tr.row-done:hover { opacity: 0.75; background: #f0fdf8; }
    tbody tr.row-done td { text-decoration: line-through; color: var(--text-muted); }
    tbody tr.row-done .status-select,
    tbody tr.row-done .group-tag-select,
    tbody tr.row-done .row-actions { text-decoration: none; }
    /* 收折時完全隱藏 */
    tbody tr.row-done.done-collapsed { display: none; }

    .date-overdue{color:#dc2626!important;font-weight:800!important}.date-warning{color:#d97706!important;font-weight:700!important}
    .group-tag-select{appearance:none;padding:0.28rem 0.7rem;border-radius:5px;font-size:0.82rem;font-weight:700;cursor:pointer;outline:none;border:1.5px solid;font-family:"Noto Sans TC",sans-serif;transition:all 0.15s}
    .tag-行政準備{background:#dbeafe;color:#1e40af;border-color:#93c5fd}.tag-影片徵選{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd}.tag-頒獎典禮{background:#fef3c7;color:#92400e;border-color:#fcd34d}.tag-市民大聲說{background:#d1fae5;color:#065f46;border-color:#6ee7b7}.tag-人才培訓{background:#fce7f3;color:#9d174d;border-color:#f9a8d4}
    .date-text{font-family:"IBM Plex Mono",monospace;font-size:0.9rem;color:var(--text-dim);font-weight:600}
    .task-content{line-height:1.65;color:var(--text)}
    .task-badge{display:inline-block;font-size:0.75rem;padding:0.12rem 0.42rem;border-radius:3px;margin-bottom:0.35rem;font-weight:700;letter-spacing:0.04em}
    .badge-new{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}.badge-warn{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}.badge-tip{background:#fef9c3;color:#854d0e;border:1px solid #fde047}
    .task-editable{cursor:text;outline:none;display:block}
    .task-editable:focus{background:#f0fdf8;border-radius:4px;outline:1.5px solid var(--accent);padding:0.2rem 0.4rem;margin:-0.2rem -0.4rem}
    .unit-text{font-size:0.9rem;color:var(--text-dim)}
    .status-select{appearance:none;background:transparent;border:1.5px solid;border-radius:20px;padding:0.3rem 0.75rem;font-family:"Noto Sans TC",sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;outline:none;transition:all 0.15s}
    .status-待開始{color:#455a64;border-color:#90a4ae;background:#f5f7f8}.status-進行中{color:#01579b;border-color:#29b6f6;background:#e1f5fe}.status-已完成{color:#1b5e20;border-color:#66bb6a;background:#e8f5e9}.status-待確認{color:#bf360c;border-color:#ffa726;background:#fff3e0}.status-延遲{color:#b71c1c;border-color:#ef9a9a;background:#ffebee}
    .note-cell{display:flex;flex-direction:column;gap:0.5rem}
    .note-original{font-size:0.9rem;color:var(--text-dim);line-height:1.55;word-break:break-word;white-space:pre-wrap}
    .note-comment{background:#fffde7;border-left:3px solid #f59e0b;border-radius:0 6px 6px 0;padding:0.6rem 0.75rem;font-size:0.9rem;color:var(--text);line-height:1.6;min-height:3.5rem;outline:none;transition:all 0.15s;font-family:"Noto Sans TC",sans-serif;word-break:break-word;white-space:pre-wrap}
    .note-comment:focus{background:#fff9c4;border-left-color:#d97706}
    .note-comment:empty::before{content:attr(data-placeholder);color:var(--text-muted)}
    .row-actions{display:flex;opacity:0;transition:opacity 0.15s}
    tr:hover .row-actions{opacity:1}
    .action-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:5px;border:1px solid var(--border);background:#fff;color:var(--text-muted);cursor:pointer;font-size:0.82rem;transition:all 0.15s}
    .action-btn:hover{border-color:#fca5a5;color:#dc2626;background:#fef2f2}
    .action-btn.edit-btn:hover{border-color:#6ee7b7;color:#059669;background:#f0fdf8}
    .month-divider td{padding:2.35rem 0.9rem 0.65rem;background:var(--bg)!important}
    #table-body tr.month-divider:first-child td,#table-body tr.month-divider.first-visible-month td{padding-top:calc(24px + 2rem)}
    .month-label{font-family:"IBM Plex Mono",monospace;font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);font-weight:700;padding:0.3rem 0.75rem;border:1.5px solid var(--border2);border-radius:5px;background:#fff;display:inline-block}
    #calendar-view{padding:0 2rem 5rem}
    .cal-nav{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 0 1rem}
    .cal-nav .btn{background:#fff;color:var(--text);border:1.5px solid var(--border2)}
    .cal-title{font-size:1.25rem;font-weight:700;color:var(--text)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .cal-day-header{background:#134e4a;color:#99f6e4;padding:0.65rem;text-align:center;font-size:0.85rem;font-weight:700}
    .cal-day{background:#fff;min-height:115px;padding:0.65rem}
    .cal-day.empty{background:#f5faf8}.cal-day.today{background:#f0fdf8}
    .cal-day-num{font-family:"IBM Plex Mono",monospace;font-size:0.9rem;font-weight:700;color:var(--text-dim);margin-bottom:0.45rem}
    .cal-day.today .cal-day-num{color:var(--accent);font-weight:900}
    .cal-task-chip{display:block;font-size:0.78rem;padding:0.2rem 0.48rem;border-radius:4px;margin-bottom:0.28rem;line-height:1.4;cursor:pointer;transition:opacity 0.12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
    .cal-task-chip:hover{opacity:0.7}
    .cal-more{font-size:0.78rem;color:var(--text-muted);cursor:pointer;margin-top:0.15rem;font-weight:600}
    .cal-legend{display:flex;gap:0.85rem;margin-top:1.1rem;flex-wrap:wrap}
    .cal-leg-dot{display:inline-block;padding:0.13rem 0.5rem;border-radius:4px;font-size:0.8rem;font-weight:600}
    #dashboard-view{padding:0 2rem 5rem}
    .dash-header{padding:1.4rem 0 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem}
    .dash-header h2{font-size:1.12rem;font-weight:700}
    .dash-header p{font-size:0.84rem;color:var(--text-muted);margin-top:0.2rem}
    .dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.15rem;margin-bottom:1.15rem}
    @media(max-width:1000px){.dash-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:640px){.dash-grid{grid-template-columns:1fr}}
    .dash-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem}
    .dash-card-title{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:0.9rem;padding-bottom:0.5rem;border-bottom:1.5px solid var(--border)}
    .cat-row{display:flex;align-items:center;gap:0.65rem;margin-bottom:0.65rem}
    .cat-name{font-size:0.84rem;font-weight:600;min-width:78px}
    .cat-bar-wrap{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
    .cat-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease}
    .cat-pct{font-family:"IBM Plex Mono",monospace;font-size:0.8rem;font-weight:700;min-width:34px;text-align:right}
    .risk-block{padding:0.85rem 1rem;border-radius:9px;display:flex;align-items:center;gap:0.85rem;margin-bottom:0.65rem}
    .risk-num{font-family:"IBM Plex Mono",monospace;font-size:1.85rem;font-weight:900;line-height:1}
    .risk-label{font-size:0.86rem;font-weight:700}.risk-sub{font-size:0.76rem;margin-top:0.15rem}
    .dl-item{display:flex;align-items:baseline;gap:0.5rem;padding:0.4rem 0;border-bottom:1px solid var(--border);font-size:0.85rem}
    .dl-item:last-child{border-bottom:none}
    .dl-tag{font-family:"IBM Plex Mono",monospace;font-size:0.74rem;font-weight:700;padding:0.12rem 0.4rem;border-radius:4px;white-space:nowrap;flex-shrink:0}
    .overdue-row{font-size:0.82rem;padding:0.28rem 0.55rem;border-radius:5px;margin-bottom:0.3rem;background:#fef2f2;border-left:3px solid #ef4444;color:#dc2626;line-height:1.4}
    .cat-status-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0.75rem}
    @media(max-width:900px){.cat-status-grid{grid-template-columns:repeat(3,1fr)}}
    .cat-status-card{background:var(--surface2);border-radius:8px;padding:0.7rem;border:1px solid var(--border)}
    .cat-status-name{font-size:0.78rem;font-weight:700;margin-bottom:0.45rem}
    .cat-status-line{font-size:0.76rem;color:var(--text-dim);display:flex;justify-content:space-between;margin-bottom:0.2rem}
    .cat-status-line span:last-child{font-family:"IBM Plex Mono",monospace;font-weight:700}
    .week-card{margin-bottom:1.15rem}
    .week-legend{display:flex;gap:0.4rem;margin-bottom:0.8rem;flex-wrap:wrap}
    .week-legend-item{font-size:0.72rem;font-weight:700;padding:0.15rem 0.55rem;border-radius:4px}
    .week-empty{text-align:center;color:var(--text-muted);font-size:0.9rem;padding:1.5rem 0}
    .week-row{display:flex;align-items:center;gap:12px;padding:0.7rem 0.85rem;border:1px solid var(--border);border-radius:8px;margin-bottom:0.55rem;background:#fff;cursor:pointer;transition:all 0.12s}
    .week-row:hover{background:#f0fdf8;border-color:var(--border2)}
    .week-row.urg-danger{background:#fef2f2;border-color:#fca5a5}
    .week-row.urg-warn{background:#fffbeb;border-color:#fcd34d}
    .week-chip{flex-shrink:0;min-width:70px;text-align:center;font-size:0.78rem;font-weight:700;padding:0.32rem 0.4rem;border-radius:5px;background:var(--surface2);color:var(--text-dim);font-family:"IBM Plex Mono",monospace}
    .week-chip.chip-today{background:#dc2626;color:#fff}.week-chip.chip-soon{background:#fee2e2;color:#991b1b}.week-chip.chip-warn{background:#fef3c7;color:#92400e}.week-chip.chip-overdue{background:#7f1d1d;color:#fff}
    .week-content{flex:1;min-width:0;overflow:hidden}
    .week-title{font-size:0.92rem;color:var(--text);line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .week-meta{font-size:0.76rem;color:var(--text-muted);margin-top:0.2rem}
    .week-pill{display:inline-block;font-size:0.7rem;font-weight:700;padding:0.05rem 0.45rem;border-radius:4px;margin-right:0.4rem;vertical-align:1px}
    .pill-point{background:#ede9fe;color:#5b21b6}.pill-window{background:#d1fae5;color:#065f46}.pill-deadline{background:#fed7aa;color:#9a3412}
    .week-action{flex-shrink:0;font-size:0.82rem;color:var(--text-dim);font-weight:600;text-align:right}
    .week-action.act-danger{color:#b91c1c}.week-action.act-warn{color:#b45309}
    .modal-wide{width:660px}
    #report-text{font-family:"IBM Plex Mono",monospace;font-size:0.82rem;background:#f8faf9;border:1.5px solid var(--border);border-radius:8px;padding:1rem;line-height:1.78;color:var(--text);height:50vh;resize:none;width:100%;outline:none}
    .report-actions{display:flex;gap:0.65rem;align-items:center;margin-top:1rem;flex-wrap:wrap}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,40,35,0.45);backdrop-filter:blur(3px);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.active{display:flex}
    .modal{background:#fff;border:1px solid var(--border);border-radius:14px;padding:2.1rem;width:530px;max-width:93vw;box-shadow:0 20px 60px rgba(0,0,0,0.18)}
    .modal h3{font-size:1.08rem;margin-bottom:1.3rem;color:var(--text);font-weight:700}
    .form-group{margin-bottom:1.05rem}
    .form-label{display:block;font-size:0.85rem;color:var(--text-dim);margin-bottom:0.4rem;font-weight:700}
    .form-input,.form-select,.form-textarea{width:100%;background:#f8faf9;border:1.5px solid var(--border2);border-radius:7px;padding:0.58rem 0.88rem;color:var(--text);font-family:"Noto Sans TC",sans-serif;font-size:0.95rem;outline:none;transition:all 0.15s}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(13,148,136,0.12);background:#fff}
    .form-select{cursor:pointer}.form-textarea{resize:vertical;min-height:90px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.9rem}
    .modal-actions{display:flex;justify-content:flex-end;gap:0.75rem;margin-top:1.5rem}
    .btn-cancel{background:#fff;color:var(--text-dim);border:1.5px solid var(--border2)}
    .btn-cancel:hover{border-color:var(--accent);color:var(--accent);background:#f0faf8}
    .toast{position:fixed;bottom:2rem;right:2rem;background:#134e4a;color:#fff;border-radius:8px;padding:0.85rem 1.4rem;font-size:0.92rem;z-index:2000;transform:translateX(130%);transition:transform 0.25s;box-shadow:0 4px 16px rgba(13,74,70,0.3)}
    .toast.show{transform:translateX(0)}
    @media print{header,.stats-bar,.toolbar,.progress-section,.row-actions,.modal-overlay,.toast{display:none!important}body{background:white}.table-wrap{padding:0}}
    ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
  </style>
</head>
<body>

<header>

</header>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-dot" style="background:#90a4ae"></div><span class="stat-label">待開始</span><span class="stat-val" id="stat-pending">—</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#29b6f6"></div><span class="stat-label">進行中</span><span class="stat-val" id="stat-ongoing">—</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#66bb6a"></div><span class="stat-label">已完成</span><span class="stat-val" id="stat-done">—</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#ffa726"></div><span class="stat-label">待確認</span><span class="stat-val" id="stat-confirm">—</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#ef9a9a"></div><span class="stat-label">延遲</span><span class="stat-val" id="stat-late">—</span></div>

  <div class="stat-item" style="margin-left:auto"><span class="stat-label">最後同步：</span><span class="stat-val" id="last-saved" style="font-size:0.88rem;color:var(--text-muted)">載入中…</span></div>
</div>

<div class="progress-section">

  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  <span class="progress-pct" id="progress-pct">0%</span>
</div>

<div class="toolbar">
  <span class="filter-label">篩選：</span>
  <button class="filter-btn active" data-cat="全部" onclick="filterCat(this)">全部</button>

  <button class="filter-btn" data-cat="影片徵選" onclick="filterCat(this)">影片徵選</button>
  <button class="filter-btn" data-cat="頒獎典禮" onclick="filterCat(this)">頒獎典禮</button>
  <button class="filter-btn" data-cat="市民大聲說" onclick="filterCat(this)">市民大聲說</button>
  <button class="filter-btn" data-cat="人才培訓" onclick="filterCat(this)">人才培訓</button>
  <button class="filter-btn" data-cat="已完成" onclick="filterCat(this)">✓ 已完成</button>
  <div class="toolbar-right">
    <button class="filter-btn" id="toggle-done-btn" onclick="toggleDoneRows()" style="white-space:nowrap;padding:0.42rem 1rem">⊖ 收折完成</button>
    <button class="filter-btn" onclick="openWeeklyReport()" style="white-space:nowrap;padding:0.42rem 1rem">📋 週報</button>

    <div class="view-toggle">
      <button class="view-btn active" id="btn-list" onclick="switchView('list')">☰ 清單</button>

    <div class="search-wrap">

</div>

<div class="table-wrap" id="table-view">

    <thead><tr><th class="col-group">分類</th><th class="col-date">日期</th><th class="col-task">工作內容</th><th class="col-unit">執行單位</th><th class="col-status">進度狀態</th><th class="col-note">備註 ／ 補充說明</th><th class="col-actions"></th></tr></thead>

    <span><span class="cal-leg-dot" style="background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd">影片徵選</span></span>
    <span><span class="cal-leg-dot" style="background:#fef3c7;color:#92400e;border:1px solid #fcd34d">頒獎典禮</span></span>
    <span><span class="cal-leg-dot" style="background:#d1fae5;color:#065f46;border:1px solid #6ee7b7">市民大聲說</span></span>

    <div class="form-group"><label class="form-label">進度狀態</label><select class="form-select" id="tm-status"><option>待開始</option><option>進行中</option><option>已完成</option><option>待確認</option><option>延遲</option></select></div>
    <div class="form-group"><label class="form-label">補充說明</label><textarea class="form-textarea" id="tm-comment" placeholder="在這裡新增說明、備忘、聯絡事項…" rows="4"></textarea></div>
    <div class="modal-actions"><button class="btn btn-cancel" onclick="closeTaskModal()">取消</button><button class="btn btn-accent" onclick="saveTaskModal()">儲存更新</button></div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3 id="modal-title">新增任務</h3>
    <div class="form-row">
      <div class="form-group"><label class="form-label">分類</label><select class="form-select" id="m-cat"><option>行政準備</option><option>影片徵選</option><option>頒獎典禮</option><option>市民大聲說</option><option>人才培訓</option></select></div>
      <div class="form-group"><label class="form-label">日期</label><input class="form-input" type="text" id="m-date" placeholder="例：7/1 或 7/1–7/31" /></div>

      <div class="form-group"><label class="form-label">執行單位</label><input class="form-input" type="text" id="m-unit" placeholder="北都行銷部" /></div>

    </div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  Apps Script Web App 網址
// ══════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbyRPxff6kKN3XIazFbgxhotXuUjZYyAhRJ3_t6G-tMTsswdRZ2lD5WKel_WEyM8BrS2/exec';
const LOCAL_KEY = 'tpf3_data';

let data = [], nextId = 100, currentFilter = "全部", currentSearch = "", currentView = "list";
let isDirty = false, isEditing = false;
// ── 已完成收折狀態 ──
let doneCollapsed = false;

const MONTHS_ZH = ["","一","二","三","四","五","六","七","八","九","十","十一","十二"];
const CATS      = ["行政準備","影片徵選","頒獎典禮","市民大聲說","人才培訓"];
const CAT_COLORS= {行政準備:"#3b82f6",影片徵選:"#8b5cf6",頒獎典禮:"#f59e0b",市民大聲說:"#10b981",人才培訓:"#ec4899"};
const STATUSES  = ["待開始","進行中","已完成","待確認","延遲"];
const WINDOW_IDS= new Set([3,15,21,48]);

// ── 工具函式 ──
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function catCls(c){return CATS.includes(c)?`tag-${c}`:""}
function stsCls(s){return STATUSES.includes(s)?`status-${s}`:"status-待開始"}
function cleanTask(t){return String(t??"").replace(/【.*?】/g,"").trim()}
function sortData(){data.sort((a,b)=>{const va=getStart(a),vb=getStart(b);const na=va?(va.getMonth()+1)*100+va.getDate():9999;const nb=vb?(vb.getMonth()+1)*100+vb.getDate():9999;return na-nb||a.id-b.id})}
function getKind(r){if(r&&r.kind)return r.kind;if(r&&WINDOW_IDS.has(r.id))return "window";return /[–\-~～]/.test(r.date)?"deadline":"point"}
function parseOne(s){if(!s)return null;const f=String(s).trim().split("/");if(f.length<2)return null;const m=parseInt(f[0]),d=parseInt(f[1]);if(isNaN(m)||isNaN(d))return null;const dt=new Date(new Date().getFullYear(),m-1,d);dt.setHours(0,0,0,0);return dt}
function parseRange(s){const parts=String(s||"").split(/[–\-~～]/);const start=parseOne(parts[0]);const end=parts[1]?parseOne(parts[1]):start;return{start,end}}
function getStart(r){return parseRange(r.date).start}
function getDue(r){return parseRange(r.date).end}
function daysLeft(r){const today=new Date();today.setHours(0,0,0,0);const d=getDue(r);if(!d)return null;return Math.round((d-today)/86400000)}
function daysToStart(r){const today=new Date();today.setHours(0,0,0,0);const s=getStart(r);if(!s)return null;return Math.round((s-today)/86400000)}
function parseDateFirst(s){const d=parseOne(String(s).split(/[–\-~～]/)[0]);return d?{month:d.getMonth()+1,day:d.getDate()}:null}
function urgency(r){if(r.status==="已完成")return "";const d=daysLeft(r);if(d===null)return "";if(d<0)return "overdue";if(d<=3&&r.status==="待開始")return "warning";if(getKind(r)==="window"&&r.status==="待開始"){const ds=daysToStart(r);if(ds!==null&&ds<=0)return "warning"}return ""}

function parseRow(r){
  const c=v=>v==null?"":String(v).trim();
  return{id:parseInt(c(r.id))||Math.floor(Math.random()*9000+1000),cat:c(r.cat)||"行政準備",date:c(r.date).replace(/^'/,""),task:c(r.task),unit:c(r.unit),status:c(r.status)||"待開始",note:c(r.note),badge:c(r.badge),comment:c(r.comment),kind:c(r.kind)||""};
}

// ── Sheets 讀取（啟動時）──
async function loadFromSheets(){
  document.getElementById("table-body").innerHTML='<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--text-muted)">從 Google Sheets 載入中…</td></tr>';
  document.getElementById("last-saved").textContent="載入中…";
  try{
    const res=await fetch(API_URL+"?action=readProgress",{redirect:"follow"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const j=await res.json();
    if(Array.isArray(j)&&j.length>0){
      data=j.map(parseRow);
      localStorage.setItem(LOCAL_KEY,JSON.stringify(data));
      document.getElementById("last-saved").textContent="已從 Sheets 載入 "+fmtTime();
    }else if(Array.isArray(j)&&j.length===0){
      const local=localStorage.getItem(LOCAL_KEY);
      data=local?JSON.parse(local):[];
      document.getElementById("last-saved").textContent=local?"本機備份":"Sheets 尚無資料";
    }else{
      throw new Error(j.msg||"格式不符");
    }
  }catch(e){
    const local=localStorage.getItem(LOCAL_KEY);
    data=local?JSON.parse(local):[];
    document.getElementById("last-saved").textContent="離線（本機備份）";
    showToast("⚠ 無法連線 Sheets："+e.message);
    console.warn("Sheets 載入失敗：",e);
  }
  nextId=data.length?Math.max(...data.map(r=>r.id||0))+1:100;
}

// ── 儲存回 Sheets ──
async function saveAll(){
  const btn=document.getElementById("saveBtn"),orig=btn.textContent;
  btn.disabled=true;btn.textContent="同步中…";
  try{
    const res=await fetch(API_URL,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"writeProgress",data:data})});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const j=await res.json();
    if(j.ok===false)throw new Error(j.msg||"回傳失敗");
    localStorage.setItem(LOCAL_KEY,JSON.stringify(data));
    document.getElementById("last-saved").textContent="已同步 "+fmtTime();
    btn.textContent="✓ 已同步";btn.style.background="#059669";
    setTimeout(()=>{btn.textContent=orig;btn.style.background="";},2500);
    showToast(`已同步至 Sheets ✓（共 ${data.length} 筆）`);
    isDirty=false;
  }catch(e){
    localStorage.setItem(LOCAL_KEY,JSON.stringify(data));
    btn.textContent="⚠ 失敗";btn.style.background="#dc2626";
    setTimeout(()=>{btn.textContent=orig;btn.style.background="";},2500);
    showToast("⚠ 同步失敗："+e.message);
  }finally{btn.disabled=false;}
}

// ── 背景輪詢（每 60 秒自動抓最新）──
async function pollUpdate(){
  if(isDirty||isEditing)return;
  try{
    const res=await fetch(API_URL+"?action=readProgress",{redirect:"follow"});
    if(!res.ok)return;
    const j=await res.json();
    if(!Array.isArray(j)||!j.length)return;
    const sig=r=>r.id+"|"+r.status+"|"+r.comment;
    const incoming=j.map(parseRow);
    if(JSON.stringify(incoming.map(sig))===JSON.stringify(data.map(sig)))return;
    data=incoming;
    nextId=Math.max(...data.map(r=>r.id||0))+1;
    localStorage.setItem(LOCAL_KEY,JSON.stringify(data));
    sortData();renderTable();
    if(currentView==="calendar")renderCalendar();
    if(currentView==="dashboard")renderDashboard();
    document.getElementById("last-saved").textContent="自動同步 "+fmtTime();
  }catch(e){console.warn("輪詢失敗",e);}
}

function fmtTime(){const n=new Date();return `${n.getHours().toString().padStart(2,"0")}:${n.getMinutes().toString().padStart(2,"0")}`}

// ── 渲染表格 ──
function renderTable(){
  const tbody=document.getElementById("table-body");tbody.innerHTML="";let lastM=null;
  data.forEach(row=>{
    const m=parseInt(row.date.split("/")[0]);
    if(m!==lastM){const tr=document.createElement("tr");tr.className="month-divider";tr.dataset.month=m;tr.innerHTML=`<td colspan="7"><span class="month-label">${MONTHS_ZH[m]||m}月</span></td>`;tbody.appendChild(tr);lastM=m;}
    const badge=row.badge==="new"?'<span class="task-badge badge-new">NEW</span><br>':row.badge==="warn"?'<span class="task-badge badge-warn">⚠ 注意</span><br>':row.badge==="tip"?'<span class="task-badge badge-tip">💡 建議</span><br>':"";
    const urg=urgency(row);const dCls=urg==="overdue"?" date-overdue":urg==="warning"?" date-warning":"";
    const tr=document.createElement("tr");tr.dataset.id=row.id;tr.dataset.cat=row.cat;
    if(urg==="overdue")tr.classList.add("row-overdue");else if(urg==="warning")tr.classList.add("row-warning");
    tr.innerHTML=`<td><select class="group-tag-select ${catCls(row.cat)}" data-id="${row.id}" onchange="changeCat(this,${row.id})">${CATS.map(c=>`<option value="${c}"${row.cat===c?" selected":""}>${c}</option>`).join("")}</select></td><td><div class="date-text task-editable${dCls}" contenteditable="true" data-field="date" data-id="${row.id}">${esc(row.date)}</div></td><td><div class="task-content">${badge}<span class="task-editable" contenteditable="true" data-field="task" data-id="${row.id}">${esc(row.task)}</span></div></td><td><span class="task-editable unit-text" contenteditable="true" data-field="unit" data-id="${row.id}">${esc(row.unit)}</span></td><td><select class="status-select ${stsCls(row.status)}" data-id="${row.id}" onchange="changeStatus(this,${row.id})">${STATUSES.map(s=>`<option${row.status===s?" selected":""}>${s}</option>`).join("")}</select></td><td><div class="note-cell">${row.note?`<div class="note-original">${esc(row.note)}</div>`:""}<div class="note-comment" contenteditable="true" data-field="comment" data-id="${row.id}" data-placeholder="點此新增說明、備忘…">${esc(row.comment||"")}</div></div></td><td><div class="row-actions"><div class="action-btn edit-btn" onclick="openEditModal(${row.id})" title="編輯">✎</div><div class="action-btn" onclick="deleteRow(${row.id})" title="刪除">✕</div></div></td>`;
    tbody.appendChild(tr);
  });
  tbody.querySelectorAll("[contenteditable]").forEach(el=>{el.addEventListener("blur",()=>{const row=data.find(r=>r.id===parseInt(el.dataset.id));if(row){row[el.dataset.field]=el.innerText.trim();isDirty=true;if(el.dataset.field==="date"&&currentView==="calendar")renderCalendar();}});});
  applyFilter();updateStats();
}

// ── 篩選 ──
function filterCat(btn){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  currentFilter=btn.dataset.cat;
  // 切到「已完成」頁籤時，自動展開收折（讓完成任務可見）
  if(currentFilter==="已完成"&&doneCollapsed){
    doneCollapsed=false;
    const tb=document.getElementById("toggle-done-btn");
    tb.textContent="⊖ 收折完成";tb.classList.remove("active");
  }
  applyFilter();
  if(currentView==="calendar")renderCalendar();
  if(currentView==="dashboard")renderDashboard();
}

function searchTable(val){currentSearch=val.toLowerCase();applyFilter();if(currentView==="calendar")renderCalendar();if(currentView==="dashboard")renderDashboard();}

function applyFilter(){
  document.querySelectorAll("#table-body tr:not(.month-divider)").forEach(tr=>{
    const rowId=parseInt(tr.dataset.id);
    const row=data.find(r=>r.id===rowId);
    const isDone=row?.status==="已完成";

    // 淡化樣式
    tr.classList.toggle("row-done",!!isDone);

    // 收折：不是「已完成」篩選頁籤時才套用收折
    if(currentFilter!=="已完成"){
      tr.classList.toggle("done-collapsed",isDone&&doneCollapsed);
    } else {
      tr.classList.remove("done-collapsed");
    }

    // 顯示邏輯
    let show;
    if(currentFilter==="已完成"){
      show=isDone&&(!currentSearch||tr.textContent.toLowerCase().includes(currentSearch));
    } else {
      show=(currentFilter==="全部"||tr.dataset.cat===currentFilter)
          &&(!currentSearch||tr.textContent.toLowerCase().includes(currentSearch));
    }
    tr.classList.toggle("hidden",!show);
  });

  // 月份標題：只要底下有任何可見（未 hidden 且未 done-collapsed）的列就顯示
  document.querySelectorAll("#table-body tr.month-divider").forEach(div=>{
    let nxt=div.nextElementSibling,vis=false;
    while(nxt&&!nxt.classList.contains("month-divider")){

function toggleDoneRows(){

  if(currentFilter==="已完成"){

  document.querySelectorAll("#table-body tr.row-done").forEach(tr=>{
    tr.classList.toggle("done-collapsed",doneCollapsed);
  });
  // 月份標題同步
  document.querySelectorAll("#table-body tr.month-divider").forEach(div=>{
    let nxt=div.nextElementSibling,vis=false;
    while(nxt&&!nxt.classList.contains("month-divider")){
      if(!nxt.classList.contains("hidden")&&!nxt.classList.contains("done-collapsed")){vis=true;break;}
      nxt=nxt.nextElementSibling;

}

function renderCalendar(){document.getElementById("cal-title").textContent=`${calYear} 年　${CAL_MON_ZH[calMonth]}月`;const first=new Date(calYear,calMonth,1).getDay();const days=new Date(calYear,calMonth+1,0).getDate();const today=new Date();const byDay={};data.forEach(r=>{if(currentFilter!=="全部"&&currentFilter!=="已完成"&&r.cat!==currentFilter)return;if(currentFilter==="已完成"&&r.status!=="已完成")return;if(currentSearch&&![r.cat,r.date,r.task,r.unit,r.status,r.note,r.comment].join(" ").toLowerCase().includes(currentSearch))return;const d=parseDateFirst(r.date);if(d&&d.month===calMonth+1){if(!byDay[d.day])byDay[d.day]=[];byDay[d.day].push(r);}});let h=CAL_DAY.map(d=>`<div class="cal-day-header">${d}</div>`).join("");for(let i=0;i<first;i++)h+=`<div class="cal-day empty"></div>`;for(let d=1;d<=days;d++){const isTd=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;const tasks=byDay[d]||[],show=tasks.slice(0,3),more=tasks.length-3;const chips=show.map(t=>`<span class="cal-task-chip" style="${chipStyle(t.cat)};${t.status==='已完成'?'opacity:0.45;text-decoration:line-through':''}" onclick="openTaskModal(${t.id})" title="${esc(t.task)}">${esc(cleanTask(t.task).slice(0,14))}</span>`).join("");const moreBtn=more>0?`<div class="cal-more" onclick="switchView('list')">+${more} 項</div>`:"";h+=`<div class="cal-day${isTd?" today":""}"><div class="cal-day-num">${d}</div>${chips}${moreBtn}</div>`;}document.getElementById("cal-grid").innerHTML=h;}

function getWeeklyActions(){const items=[];data.forEach(row=>{if(row.status==="已完成")return;const kind=getKind(row);const dDue=daysLeft(row),dStart=daysToStart(row);if(dDue===null)return;let include=false,chip="",action="",chipCls="",actCls="",urgCls="",sortKey=999;if(kind==="point"){if(dDue<-3||dDue>7)return;include=true;sortKey=dDue;if(dDue<0){chip=`逾 ${-dDue} 天`;chipCls="chip-overdue";urgCls="urg-danger";action="已逾期";actCls="act-danger";}else if(dDue===0){chip="今天";chipCls="chip-today";urgCls="urg-danger";action="當天要做";actCls="act-danger";}else if(dDue===1){chip="明天";chipCls="chip-warn";urgCls="urg-warn";action="明天要做";actCls="act-warn";}else if(dDue<=3){chip=`${dDue} 天後`;chipCls="chip-warn";urgCls="urg-warn";action=`${dDue} 天後要做`;actCls="act-warn";}else{chip=`${dDue} 天後`;action=`${dDue} 天後要做`;}}else if(kind==="deadline"){if(dDue>=-3&&dDue<=7){include=true;sortKey=dDue-0.1;if(dDue<0){chip=`逾 ${-dDue} 天`;chipCls="chip-overdue";urgCls="urg-danger";action="已逾期";actCls="act-danger";}else if(dDue===0){chip="今天";chipCls="chip-today";urgCls="urg-danger";action="今天截止";actCls="act-danger";}else if(dDue<=3&&row.status==="待開始"){chip=`剩 ${dDue} 天`;chipCls="chip-soon";urgCls="urg-danger";action="還沒動・趕快開始";actCls="act-danger";}else if(dDue<=3){chip=`${dDue} 天後`;chipCls="chip-warn";urgCls="urg-warn";action=`${dDue} 天後截止`;actCls="act-warn";}else{chip=`${dDue} 天後`;action=`${dDue} 天後截止`;}}else if(dStart!==null&&dStart>=0&&dStart<=7){include=true;sortKey=dStart+0.3;chip=dStart===0?"可開始":`${dStart} 天後`;action="本週可動工";}else return;}else if(kind==="window"){const inWindow=dStart!==null&&dStart<=0&&dDue>=0;const opensThisWeek=dStart!==null&&dStart>=0&&dStart<=7;const closesThisWeek=dDue>=0&&dDue<=7;if(dDue<0){include=true;sortKey=dDue;chip=`逾 ${-dDue} 天`;chipCls="chip-overdue";urgCls="urg-danger";action="已過期";actCls="act-danger";}else if(opensThisWeek){include=true;sortKey=dStart+0.5;chip=dStart===0?"今天開跑":dStart===1?"明天開跑":`${dStart} 天後`;if(dStart===0)chipCls="chip-today";else if(dStart function renderWeeklyActions(){const items=getWeeklyActions();const legend=`<div class="week-legend"><span class="week-legend-item pill-point">提醒・鬧鐘</span><span class="week-legend-item pill-window">期間・馬拉松</span><span class="week-legend-item pill-deadline">截止・暑假作業</span></div>`;if(!items.length)return `<div class="dash-card week-card"><div class="dash-card-title">⚔ 本週作戰清單</div>${legend}<div class="week-empty">✅ 本週沒有需要立即動手的任務</div></div>`;const kl={point:"提醒",window:"期間",deadline:"截止"};const rows=items.map(({row,kind,chip,chipCls,action,actCls,urgCls})=>`<div class="week-row ${urgCls}" onclick="openTaskModal(${row.id})"><div class="week-chip ${chipCls}">${esc(chip)}</div><div class="week-content"><div class="week-title"><span class="week-pill pill-${kind}">${kl[kind]}</span>${esc(cleanTask(row.task))}</div><div class="week-meta">${esc(row.cat)}　・　${esc(row.date)}</div></div><div class="week-action ${actCls}">${esc(action)}</div></div>`).join("");return `<div class="dash-card week-card"><div class="dash-card-title">⚔ 本週作戰清單　<span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted);font-size:0.78rem;margin-left:0.5rem">共 ${items.length} 項</span></div>${legend}${rows}</div>`;}

function adjustFont(d){fontSize=Math.max(0.8,Math.min(1.4,fontSize+d*0.05));try{localStorage.setItem("tpf3_font",fontSize);}catch{}applyFont();}
applyFont();

function exportCSV(){const h=["分類","日期","工作內容","執行單位","進度狀態","備註","補充說明"];const csv="﻿"+[h,...data.map(r=>[r.cat,r.date,r.task,r.unit,r.status,r.note,r.comment])].map(r=>r.map(c=>`"${(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));a.download="台北有影3_進度表.csv";a.click();showToast("CSV 匯出成功");}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2800);}

document.addEventListener("keydown",e=>{if((e.ctrlKey||e.metaKey)&&e.key==="s"){e.preventDefault();saveAll();}});
document.addEventListener("focusin",e=>{if(e.target.isContentEditable||["SELECT","TEXTAREA","INPUT"].includes(e.target.tagName))isEditing=true;});
document.addEventListener("focusout",()=>{setTimeout(()=>{isEditing=false;},3000);});

(async()=>{
  await loadFromSheets();
  sortData();
  renderTable();
  setInterval(pollUpdate,60000);
})();
</script>
