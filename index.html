<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台北有影 3｜2026 專案進度追蹤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0faf8;
  --surface: #ffffff;
  --surface2: #e6f5f2;
  --border: #c8e6e0;
  --border2: #a8d5cc;
  --accent: #0d9488;
  --accent-hover: #0f766e;
  --text: #1a3330;
  --text-dim: #3d5c57;
  --text-muted: #5f8a84;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; }
body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* HEADER */
header {
  position:sticky; top:0; z-index:100;
  background:#134e4a; padding:0 2rem;
  display:flex; align-items:center; justify-content:space-between;
  height:68px; box-shadow:0 2px 12px rgba(13,74,70,0.25);
}
.header-left { display:flex; align-items:center; gap:1.5rem; }
.logo { font-family:'IBM Plex Mono',monospace; font-size:0.72rem; letter-spacing:0.2em; color:#5eead4; text-transform:uppercase; }
.project-title { font-size:1.1rem; font-weight:700; color:#ffffff; }
.project-title .year { color:#99f6e4; font-size:0.9rem; font-weight:400; margin-left:0.5rem; }
.header-right { display:flex; align-items:center; gap:0.6rem; }
.font-ctrl { display:flex; gap:0.3rem; }

.btn {
  display:inline-flex; align-items:center; gap:0.4rem;
  padding:0.45rem 1rem; border-radius:8px;
  border:1px solid rgba(255,255,255,0.22); background:rgba(255,255,255,0.12);
  color:#e0fdf4; font-family:'Noto Sans TC',sans-serif; font-size:0.88rem;
  cursor:pointer; transition:all 0.15s; text-decoration:none;
}
.btn:hover { background:rgba(255,255,255,0.24); color:#fff; }
.btn-accent { background:#0d9488; border-color:#0d9488; color:#fff; font-weight:700; box-shadow:0 2px 6px rgba(13,148,136,0.4); }
.btn-accent:hover { background:#0f766e; border-color:#0f766e; }
.font-btn { padding:0.35rem 0.65rem; font-size:0.82rem; font-weight:700; }

/* STATS */
.stats-bar { background:#fff; border-bottom:1px solid var(--border); padding:0.9rem 2rem; display:flex; align-items:center; gap:2.2rem; overflow-x:auto; }
.stat-item { display:flex; align-items:center; gap:0.5rem; white-space:nowrap; }
.stat-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.stat-label { font-size:0.9rem; color:var(--text-dim); font-weight:500; }
.stat-val { font-family:'IBM Plex Mono',monospace; font-size:1.05rem; font-weight:700; color:var(--text); }

/* PROGRESS */
.progress-section { background:#fff; border-bottom:1px solid var(--border); padding:0.9rem 2rem; display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; }
.progress-label { font-size:0.9rem; color:var(--text-dim); font-weight:600; white-space:nowrap; }
.progress-bar-wrap { flex:1; min-width:180px; height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; }
.progress-bar-fill { height:100%; background:linear-gradient(90deg,#0d9488,#059669); border-radius:4px; transition:width 0.4s; }
.progress-pct { font-family:'IBM Plex Mono',monospace; font-size:1.05rem; font-weight:700; color:var(--accent); }

/* TOOLBAR */
.toolbar { background:#fff; border-bottom:2px solid var(--border); padding:0.85rem 2rem; display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap; }
.filter-label { font-size:0.9rem; color:var(--text-dim); font-weight:700; }
.filter-btn {
  padding:0.4rem 1rem; border-radius:20px; border:1.5px solid var(--border2);
  background:#fff; color:var(--text-dim); font-family:'Noto Sans TC',sans-serif;
  font-size:0.88rem; cursor:pointer; transition:all 0.15s; font-weight:500;
}
.filter-btn:hover { border-color:var(--accent); color:var(--accent); background:#f0faf8; }
.filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
.filter-btn[data-cat="行政準備"].active { background:#2563eb; border-color:#2563eb; }
.filter-btn[data-cat="影片徵選"].active { background:#7c3aed; border-color:#7c3aed; }
.filter-btn[data-cat="頒獎典禮"].active { background:#b45309; border-color:#b45309; }
.filter-btn[data-cat="市民大聲說"].active { background:#059669; border-color:#059669; }
.filter-btn[data-cat="人才培訓"].active { background:#be185d; border-color:#be185d; }

.toolbar-right { margin-left:auto; display:flex; align-items:center; gap:0.6rem; }
.add-task-btn {
  display:inline-flex; align-items:center; gap:0.4rem;
  padding:0.48rem 1.15rem; border-radius:8px;
  background:var(--accent); border:none; color:#fff;
  font-family:'Noto Sans TC',sans-serif; font-size:0.92rem; font-weight:700;
  cursor:pointer; transition:all 0.15s; box-shadow:0 2px 6px rgba(13,148,136,0.3);
}
.add-task-btn:hover { background:var(--accent-hover); box-shadow:0 3px 10px rgba(13,148,136,0.4); }

.view-toggle { display:flex; border:1.5px solid var(--border2); border-radius:8px; overflow:hidden; }
.view-btn { padding:0.4rem 0.95rem; border:none; background:transparent; color:var(--text-dim); font-family:'Noto Sans TC',sans-serif; font-size:0.88rem; cursor:pointer; transition:all 0.15s; font-weight:500; }
.view-btn.active { background:var(--accent); color:#fff; font-weight:700; }
.view-btn:hover:not(.active) { background:var(--surface2); color:var(--text); }

.search-wrap { position:relative; }
.search-input { background:#fff; border:1.5px solid var(--border2); border-radius:8px; padding:0.42rem 0.85rem 0.42rem 2.1rem; color:var(--text); font-family:'Noto Sans TC',sans-serif; font-size:0.9rem; width:210px; outline:none; transition:all 0.15s; }
.search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(13,148,136,0.12); }
.search-input::placeholder { color:var(--text-muted); }
.search-icon { position:absolute; left:0.6rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.85rem; pointer-events:none; }

/* TABLE */
.table-wrap {
  overflow-x:auto;
  padding:0 2rem 5rem;
}

/* sticky 表頭用 separate 比 collapse 穩定，避免第一個月份列被裁切 */
table {
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  margin-top:1rem;
  font-size:0.97rem;
}

thead th {
  padding:0.75rem 0.9rem;
  text-align:left;
  font-size:0.8rem;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--text-dim);
  border-bottom:2px solid var(--border);
  white-space:nowrap;
  position:sticky;
  top:68px;
  background:var(--bg);
  z-index:30;
}
thead th:first-child { padding-left:0; }
.col-group { width:100px; } .col-date { width:120px; } .col-task { min-width:280px; }
.col-unit { width:160px; } .col-status { width:128px; } .col-note { min-width:240px; } .col-actions { width:50px; }

tbody tr { border-bottom:1px solid var(--border); transition:background 0.1s; }
tbody tr:hover { background:#f0fdf8; }
tbody tr.hidden { display:none; }
tbody td { padding:0.95rem 0.9rem; vertical-align:top; }
tbody td:first-child { padding-left:0; }

/* ── 逾期 / 警告 列標色 ── */
tbody tr.row-overdue { background:#fff5f5; }
tbody tr.row-overdue:hover { background:#fee8e8; }
tbody tr.row-warning { background:#fffdf0; }
tbody tr.row-warning:hover { background:#fef9c3; }
.date-overdue { color:#dc2626 !important; font-weight:800 !important; }
.date-warning  { color:#d97706 !important; font-weight:700 !important; }

.group-tag-select {
  appearance: none;
  padding: 0.28rem 0.7rem; border-radius: 5px;
  font-size: 0.82rem; font-weight: 700; white-space: nowrap;
  cursor: pointer; outline: none; border: 1.5px solid;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.15s;
}
.group-tag-select.tag-行政準備 { background:#dbeafe; color:#1e40af; border-color:#93c5fd; }
.group-tag-select.tag-影片徵選 { background:#ede9fe; color:#5b21b6; border-color:#c4b5fd; }
.group-tag-select.tag-頒獎典禮 { background:#fef3c7; color:#92400e; border-color:#fcd34d; }
.group-tag-select.tag-市民大聲說 { background:#d1fae5; color:#065f46; border-color:#6ee7b7; }
.group-tag-select.tag-人才培訓 { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
.tag-行政準備 { background:#dbeafe; color:#1e40af; border:1.5px solid #93c5fd; }
.tag-影片徵選 { background:#ede9fe; color:#5b21b6; border:1.5px solid #c4b5fd; }
.tag-頒獎典禮 { background:#fef3c7; color:#92400e; border:1.5px solid #fcd34d; }
.tag-市民大聲說 { background:#d1fae5; color:#065f46; border:1.5px solid #6ee7b7; }
.tag-人才培訓 { background:#fce7f3; color:#9d174d; border:1.5px solid #f9a8d4; }

.date-text { font-family:'IBM Plex Mono',monospace; font-size:0.9rem; color:var(--text-dim); font-weight:600; }
.task-content { line-height:1.65; color:var(--text); }
.task-badge { display:inline-block; font-size:0.75rem; padding:0.12rem 0.42rem; border-radius:3px; margin-bottom:0.35rem; font-weight:700; letter-spacing:0.04em; }
.badge-new { background:#dbeafe; color:#1e40af; border:1px solid #93c5fd; }
.badge-warn { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
.badge-tip { background:#fef9c3; color:#854d0e; border:1px solid #fde047; }
.task-editable { cursor:text; outline:none; display:block; }
.task-editable:focus { background:#f0fdf8; border-radius:4px; outline:1.5px solid var(--accent); padding:0.2rem 0.4rem; margin:-0.2rem -0.4rem; }
.unit-text { font-size:0.9rem; color:var(--text-dim); }

.status-select { appearance:none; background:transparent; border:1.5px solid; border-radius:20px; padding:0.3rem 0.75rem; font-family:'Noto Sans TC',sans-serif; font-size:0.88rem; font-weight:600; cursor:pointer; outline:none; transition:all 0.15s; }
.status-待開始 { color:#455a64; border-color:#90a4ae; background:#f5f7f8; }
.status-進行中 { color:#01579b; border-color:#29b6f6; background:#e1f5fe; }
.status-已完成 { color:#1b5e20; border-color:#66bb6a; background:#e8f5e9; }
.status-待確認 { color:#bf360c; border-color:#ffa726; background:#fff3e0; }
.status-延遲 { color:#b71c1c; border-color:#ef9a9a; background:#ffebee; }

.note-cell { display:flex; flex-direction:column; gap:0.5rem; }
.note-original { font-size:0.9rem; color:var(--text-dim); line-height:1.55; word-break:break-word; white-space:pre-wrap; }
.note-comment {
  background:#fffde7; border-left:3px solid #f59e0b; border-radius:0 6px 6px 0;
  padding:0.6rem 0.75rem; font-size:0.9rem; color:var(--text); line-height:1.6;
  min-height:3.5rem; outline:none; transition:all 0.15s; font-family:'Noto Sans TC',sans-serif;
  word-break:break-word; white-space:pre-wrap; overflow-wrap:break-word;
}
.note-comment:focus { background:#fff9c4; border-left-color:#d97706; }
.note-comment:empty::before { content:attr(data-placeholder); color:var(--text-muted); white-space:normal; }

.row-actions { display:flex; opacity:0; transition:opacity 0.15s; }
tr:hover .row-actions { opacity:1; }
.action-btn { width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:5px; border:1px solid var(--border); background:#fff; color:var(--text-muted); cursor:pointer; font-size:0.82rem; transition:all 0.15s; }
.action-btn:hover { border-color:#fca5a5; color:#dc2626; background:#fef2f2; }
.action-btn.edit-btn:hover { border-color:#6ee7b7; color:#059669; background:#f0fdf8; }

.month-divider td {
  padding:2.35rem 0.9rem 0.65rem;
  background:var(--bg)!important;
  position:relative;
  z-index:5;
}

/* 第一個月份標籤額外補一點上方空間，避免被 sticky thead 壓住 */
#table-body tr.month-divider:first-child td {
  padding-top: calc(24px + 2rem); /* header高度 + 緩衝 */
}

.month-label {
  font-family:'IBM Plex Mono',monospace;
  font-size:0.75rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--text-dim);
  font-weight:700;
  padding:0.3rem 0.75rem;
  border:1.5px solid var(--border2);
  border-radius:5px;
  background:#fff;
  display:inline-block;
}
/* CALENDAR */
#calendar-view { padding:0 2rem 5rem; }
.cal-nav { display:flex; align-items:center; justify-content:space-between; padding:1.5rem 0 1rem; }
.cal-nav .btn { background:#fff; color:var(--text); border:1.5px solid var(--border2); }
.cal-nav .btn:hover { border-color:var(--accent); color:var(--accent); background:#f0faf8; }
.cal-title { font-size:1.25rem; font-weight:700; color:var(--text); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.cal-day-header { background:#134e4a; color:#99f6e4; padding:0.65rem; text-align:center; font-size:0.85rem; font-weight:700; }
.cal-day { background:#fff; min-height:115px; padding:0.65rem; }
.cal-day.empty { background:#f5faf8; }
.cal-day.today { background:#f0fdf8; }
.cal-day-num { font-family:'IBM Plex Mono',monospace; font-size:0.9rem; font-weight:700; color:var(--text-dim); margin-bottom:0.45rem; }
.cal-day.today .cal-day-num { color:var(--accent); font-weight:900; }
.cal-task-chip { display:block; font-size:0.78rem; padding:0.2rem 0.48rem; border-radius:4px; margin-bottom:0.28rem; line-height:1.4; cursor:pointer; transition:opacity 0.12s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600; }
.cal-task-chip:hover { opacity:0.7; }
.cal-more { font-size:0.78rem; color:var(--text-muted); cursor:pointer; margin-top:0.15rem; font-weight:600; }
.cal-legend { display:flex; gap:0.85rem; margin-top:1.1rem; flex-wrap:wrap; }
.cal-leg-dot { display:inline-block; padding:0.13rem 0.5rem; border-radius:4px; font-size:0.8rem; font-weight:600; }

/* ── DASHBOARD ── */
#dashboard-view { padding:0 2rem 5rem; }
.dash-header { padding:1.4rem 0 1.2rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.75rem; }
.dash-header h2 { font-size:1.12rem; font-weight:700; color:var(--text); }
.dash-header p { font-size:0.84rem; color:var(--text-muted); margin-top:0.2rem; }
.dash-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.15rem; margin-bottom:1.15rem; }
@media (max-width:1000px) { .dash-grid { grid-template-columns:1fr 1fr; } }
@media (max-width:640px) { .dash-grid { grid-template-columns:1fr; } }
.dash-card { background:#fff; border:1.5px solid var(--border); border-radius:12px; padding:1.2rem 1.4rem; }
.dash-card-title { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); margin-bottom:0.9rem; padding-bottom:0.5rem; border-bottom:1.5px solid var(--border); }
.cat-row { display:flex; align-items:center; gap:0.65rem; margin-bottom:0.65rem; }
.cat-row:last-child { margin-bottom:0; }
.cat-name { font-size:0.84rem; font-weight:600; min-width:78px; }
.cat-bar-wrap { flex:1; height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; }
.cat-bar-fill { height:100%; border-radius:4px; transition:width 0.5s ease; }
.cat-pct { font-family:'IBM Plex Mono',monospace; font-size:0.8rem; font-weight:700; min-width:34px; text-align:right; }
.risk-block { padding:0.85rem 1rem; border-radius:9px; display:flex; align-items:center; gap:0.85rem; margin-bottom:0.65rem; }
.risk-num { font-family:'IBM Plex Mono',monospace; font-size:1.85rem; font-weight:900; line-height:1; }
.risk-label { font-size:0.86rem; font-weight:700; }
.risk-sub { font-size:0.76rem; margin-top:0.15rem; }
.dl-item { display:flex; align-items:baseline; gap:0.5rem; padding:0.4rem 0; border-bottom:1px solid var(--border); font-size:0.85rem; }
.dl-item:last-child { border-bottom:none; }
.dl-tag { font-family:'IBM Plex Mono',monospace; font-size:0.74rem; font-weight:700; padding:0.12rem 0.4rem; border-radius:4px; white-space:nowrap; flex-shrink:0; }
.overdue-row { font-size:0.82rem; padding:0.28rem 0.55rem; border-radius:5px; margin-bottom:0.3rem; background:#fef2f2; border-left:3px solid #ef4444; color:#dc2626; line-height:1.4; }
.cat-status-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:0.75rem; }
@media (max-width:900px) { .cat-status-grid { grid-template-columns:repeat(3,1fr); } }
.cat-status-card { background:var(--surface2); border-radius:8px; padding:0.7rem; border:1px solid var(--border); }
.cat-status-name { font-size:0.78rem; font-weight:700; margin-bottom:0.45rem; }
.cat-status-line { font-size:0.76rem; color:var(--text-dim); display:flex; justify-content:space-between; margin-bottom:0.2rem; }
.cat-status-line span:last-child { font-family:'IBM Plex Mono',monospace; font-weight:700; }

/* ── WEEKLY REPORT MODAL ── */
.modal-wide { width:660px; }
#report-text {
  font-family:'IBM Plex Mono',monospace; font-size:0.82rem;
  background:#f8faf9; border:1.5px solid var(--border); border-radius:8px;
  padding:1rem; line-height:1.78; color:var(--text);
  height:50vh; resize:none; width:100%; outline:none;
}
#report-text:focus { border-color:var(--accent); }
.report-actions { display:flex; gap:0.65rem; align-items:center; margin-top:1rem; flex-wrap:wrap; }

/* MODALS */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(15,40,35,0.45); backdrop-filter:blur(3px); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.active { display:flex; }
.modal { background:#fff; border:1px solid var(--border); border-radius:14px; padding:2.1rem; width:530px; max-width:93vw; box-shadow:0 20px 60px rgba(0,0,0,0.18); }
.modal h3 { font-size:1.08rem; margin-bottom:1.3rem; color:var(--text); font-weight:700; }
.form-group { margin-bottom:1.05rem; }
.form-label { display:block; font-size:0.85rem; color:var(--text-dim); margin-bottom:0.4rem; font-weight:700; }
.form-input,.form-select,.form-textarea { width:100%; background:#f8faf9; border:1.5px solid var(--border2); border-radius:7px; padding:0.58rem 0.88rem; color:var(--text); font-family:'Noto Sans TC',sans-serif; font-size:0.95rem; outline:none; transition:all 0.15s; }
.form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(13,148,136,0.12); background:#fff; }
.form-select { cursor:pointer; }
.form-textarea { resize:vertical; min-height:90px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:0.9rem; }
.modal-actions { display:flex; justify-content:flex-end; gap:0.75rem; margin-top:1.5rem; }
.btn-cancel { background:#fff; color:var(--text-dim); border:1.5px solid var(--border2); }
.btn-cancel:hover { border-color:var(--accent); color:var(--accent); background:#f0faf8; }

/* TOAST */
.toast { position:fixed; bottom:2rem; right:2rem; background:#134e4a; color:#fff; border-radius:8px; padding:0.85rem 1.4rem; font-size:0.92rem; z-index:2000; transform:translateX(130%); transition:transform 0.25s; box-shadow:0 4px 16px rgba(13,74,70,0.3); }
.toast.show { transform:translateX(0); }

@media print {
  header,.stats-bar,.toolbar,.progress-section,.row-actions,.modal-overlay,.toast { display:none!important; }
  body { background:white; }
  .table-wrap { padding:0; }
}
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">PAC · 公用頻道</div>
    <div class="project-title">台北有影 3<span class="year">2026 專案進度追蹤</span></div>
  </div>
  <div class="header-right">
    <div class="font-ctrl">
      <button class="btn font-btn" onclick="adjustFont(-1)">A－</button>
      <button class="btn font-btn" onclick="adjustFont(1)">A＋</button>
    </div>
    <button class="btn" onclick="exportCSV()">⬇ 匯出</button>
    <button class="btn" onclick="window.print()">⎙ 列印</button>
    <button class="btn btn-accent" onclick="saveAll()">✓ 儲存</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-dot" style="background:#90a4ae"></div><span class="stat-label">待開始</span><span class="stat-val" id="stat-pending">—</span></div>

let data=[], nextId=100, currentFilter='全部', currentSearch='', currentView='list';
const MONTHS_ZH=['','一','二','三','四','五','六','七','八','九','十','十一','十二'];

// ── 逾期 / 警告 偵測 ──
function parseDateFirst(s){const f=s.split(/[–\-]/)[0].trim().split('/');return f.length<2?null:{month:parseInt(f[0]),day:parseInt(f[1])};}

function getDeadline(row){
  const d=parseDateFirst(row.date); if(!d) return null;
  const dt=new Date(new Date().getFullYear(),d.month-1,d.day); dt.setHours(0,0,0,0); return dt;
}
function getDaysLeft(row){
  const today=new Date(); today.setHours(0,0,0,0);
  const dl=getDeadline(row); if(!dl) return null;
  return Math.round((dl-today)/86400000);
}
function urgencyLevel(row){
  if(row.status==='已完成') return '';
  const d=getDaysLeft(row); if(d===null) return '';
  if(d<0) return 'overdue';
  if(d<=3&&row.status==='待開始') return 'warning';
  return '';
}

// ── RENDER ──
function renderTable(){
  const tbody=document.getElementById('table-body');
  tbody.innerHTML='';
  let lastM=null;
  data.forEach(row=>{
    const m=parseInt(row.date.split('/')[0]);
    if(m!==lastM){
      const tr=document.createElement('tr');
      tr.className='month-divider'; tr.dataset.month=m;
      tr.innerHTML=`<td colspan="7"><span class="month-label">${MONTHS_ZH[m]||m}月</span></td>`;
      tbody.appendChild(tr); lastM=m;
    }
    const badge=row.badge==='new'?'<span class="task-badge badge-new">NEW</span><br>':
      row.badge==='warn'?'<span class="task-badge badge-warn">⚠ 注意</span><br>':
      row.badge==='tip'?'<span class="task-badge badge-tip">💡 建議</span><br>':'';
    const urg=urgencyLevel(row);
    const dateCls=urg==='overdue'?' date-overdue':urg==='warning'?' date-warning':'';
    const tr=document.createElement('tr');
    tr.dataset.id=row.id; tr.dataset.cat=row.cat;
    if(urg==='overdue') tr.classList.add('row-overdue');
    else if(urg==='warning') tr.classList.add('row-warning');
    tr.innerHTML=`
      <td>
        <select class="group-tag-select tag-${row.cat}" data-id="${row.id}" onchange="changeCat(this,${row.id})">
          <option value="行政準備" ${row.cat==='行政準備'?'selected':''}>行政準備</option>
          <option value="影片徵選" ${row.cat==='影片徵選'?'selected':''}>影片徵選</option>
          <option value="頒獎典禮" ${row.cat==='頒獎典禮'?'selected':''}>頒獎典禮</option>
          <option value="市民大聲說" ${row.cat==='市民大聲說'?'selected':''}>市民大聲說</option>
          <option value="人才培訓" ${row.cat==='人才培訓'?'selected':''}>人才培訓</option>
        </select>
      </td>
      <td><div class="date-text task-editable${dateCls}" contenteditable="true" data-field="date" data-id="${row.id}">${row.date}</div></td>
      <td><div class="task-content">${badge}<span class="task-editable" contenteditable="true" data-field="task" data-id="${row.id}">${row.task}</span></div></td>
      <td><span class="task-editable unit-text" contenteditable="true" data-field="unit" data-id="${row.id}">${row.unit}</span></td>
      <td><select class="status-select status-${row.status}" data-id="${row.id}" onchange="changeStatus(this,${row.id})">
        <option ${row.status==='待開始'?'selected':''}>待開始</option>
        <option ${row.status==='進行中'?'selected':''}>進行中</option>
        <option ${row.status==='已完成'?'selected':''}>已完成</option>
        <option ${row.status==='待確認'?'selected':''}>待確認</option>
        <option ${row.status==='延遲'?'selected':''}>延遲</option>
      </select></td>
      <td><div class="note-cell">
        ${row.note?`<div class="note-original">${row.note}</div>`:''}
        <div class="note-comment" contenteditable="true" data-field="comment" data-id="${row.id}" data-placeholder="點此新增說明、備忘…">${row.comment||''}</div>
      </div></td>
      <td><div class="row-actions">
        <div class="action-btn edit-btn" onclick="openEditModal(${row.id})" title="編輯">✎</div>
        <div class="action-btn" onclick="deleteRow(${row.id})" title="刪除">✕</div>
      </div></td>`;
    tbody.appendChild(tr);
  });
  tbody.querySelectorAll('[contenteditable]').forEach(el=>{
    el.addEventListener('blur',()=>{
      const row=data.find(r=>r.id===parseInt(el.dataset.id));
      if(row){ row[el.dataset.field]=el.innerText.trim(); isDirty=true;
        if(el.dataset.field==='date'&&currentView==='calendar') renderCalendar(); }
    });
  });

// ── FILTER ──
function filterCat(btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter=btn.dataset.cat;
  applyFilter();
  if(currentView==='calendar') renderCalendar();
  if(currentView==='dashboard') renderDashboard();
}
function searchTable(val){
  currentSearch=val.toLowerCase();
  applyFilter();
  if(currentView==='calendar') renderCalendar();
  if(currentView==='dashboard') renderDashboard();
}
function applyFilter(){
  document.querySelectorAll('#table-body tr:not(.month-divider)').forEach(tr=>{
    const catOk=currentFilter==='全部'||tr.dataset.cat===currentFilter;
    const ok=catOk&&(!currentSearch||tr.textContent.toLowerCase().includes(currentSearch));
    tr.classList.toggle('hidden',!ok);
  });
  document.querySelectorAll('#table-body tr.month-divider').forEach(div=>{
    let nxt=div.nextElementSibling,vis=false;
    while(nxt&&!nxt.classList.contains('month-divider')){
      if(!nxt.classList.contains('hidden')){vis=true;break;}
      nxt=nxt.nextElementSibling;
    }
    div.classList.toggle('hidden',!vis);
  });
}
function changeCat(sel,id){
  const row=data.find(r=>r.id===id);
  if(row){ row.cat=sel.value; isDirty=true;
    sel.className=`group-tag-select tag-${sel.value}`;
    sel.closest('tr').dataset.cat=sel.value;
    applyFilter(); if(currentView==='calendar') renderCalendar(); }
}
function changeStatus(sel,id){
  const row=data.find(r=>r.id===id);
  if(row){ row.status=sel.value; isDirty=true;
    sel.className=`status-select status-${sel.value}`;
    updateStats(); if(currentView==='dashboard') renderDashboard(); }
}
function updateStats(){
  const c={'待開始':0,'進行中':0,'已完成':0,'待確認':0,'延遲':0};
  data.forEach(r=>{if(c[r.status]!==undefined)c[r.status]++;});
  ['pending','ongoing','done','confirm','late'].forEach((k,i)=>{
    document.getElementById('stat-'+k).textContent=Object.values(c)[i];
  });
  const overdueCnt=data.filter(r=>urgencyLevel(r)==='overdue').length;
  const el=document.getElementById('stat-overdue');
  el.textContent=overdueCnt;
  el.style.color=overdueCnt>0?'#dc2626':'var(--text-muted)';
  const pct=data.length?Math.round(c['已完成']/data.length*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
}
function deleteRow(id){
  if(!confirm('確定刪除此任務？'))return;
  data=data.filter(r=>r.id!==id); isDirty=true;
  renderTable(); showToast('已刪除任務');
}

// ── CALENDAR ──
let calMonth=4, calYear=2026;
const CAL_MONTH_ZH=['一','二','三','四','五','六','七','八','九','十','十一','十二'];
const CAL_DAY=['日','一','二','三','四','五','六'];
function chipStyle(cat){
  return({
    '行政準備':'background:#dbeafe;border:1px solid #93c5fd;color:#1e40af',
    '影片徵選':'background:#ede9fe;border:1px solid #c4b5fd;color:#5b21b6',
    '頒獎典禮':'background:#fef3c7;border:1px solid #fcd34d;color:#92400e',
    '市民大聲說':'background:#d1fae5;border:1px solid #6ee7b7;color:#065f46',
    '人才培訓':'background:#fce7f3;border:1px solid #f9a8d4;color:#9d174d',
  })[cat]||'background:#f0f4f4;color:#3d5c57';
}
function renderCalendar(){
  document.getElementById('cal-title').textContent=`${calYear} 年　${CAL_MONTH_ZH[calMonth]}月`;
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  const byDay={};
  data.forEach(r=>{
    if(currentFilter!=='全部'&&r.cat!==currentFilter) return;
    if(currentSearch&&!r.task.toLowerCase().includes(currentSearch)&&!r.cat.toLowerCase().includes(currentSearch)) return;
    const d=parseDateFirst(r.date);
    if(d&&d.month===calMonth+1){if(!byDay[d.day])byDay[d.day]=[];byDay[d.day].push(r);}
  });
  let h=CAL_DAY.map(d=>`<div class="cal-day-header">${d}</div>`).join('');
  for(let i=0;i<first;i++)h+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    const tasks=byDay[d]||[],show=tasks.slice(0,3),more=tasks.length-3;
    const chips=show.map(t=>`<span class="cal-task-chip" style="${chipStyle(t.cat)}" onclick="openTaskModal(${t.id})" title="${t.task}">${t.task.replace(/【.*?】/g,'').trim().slice(0,14)}</span>`).join('');
    const moreBtn=more>0?`<div class="cal-more" onclick="switchView('list')">+${more} 項</div>`:'';
    h+=`<div class="cal-day${isToday?' today':''}"><div class="cal-day-num">${d}</div>${chips}${moreBtn}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=h;
}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}

const CATS=['行政準備','影片徵選','頒獎典禮','市民大聲說','人才培訓'];
const CAT_COLORS={'行政準備':'#3b82f6','影片徵選':'#8b5cf6','頒獎典禮':'#f59e0b','市民大聲說':'#10b981','人才培訓':'#ec4899'};

function renderDashboard(){
  const overdueTasks=data.filter(r=>urgencyLevel(r)==='overdue');
  const warningTasks=data.filter(r=>urgencyLevel(r)==='warning');
  const catStats=CATS.map(cat=>{
    const tasks=data.filter(r=>r.cat===cat);
    const done=tasks.filter(r=>r.status==='已完成').length;
    const total=tasks.length;
    const pct=total?Math.round(done/total*100):0;
    return{cat,done,total,pct};
  });
  const upcoming=data.filter(r=>{
    if(r.status==='已完成') return false;
    const d=getDaysLeft(r); return d!==null&&d>=-30&&d<=14;
  }).sort((a,b)=>(getDaysLeft(a)??999)-(getDaysLeft(b)??999)).slice(0,9);

  const statusKeys=['待開始','進行中','已完成','待確認','延遲'];
  const catStatusCards=CATS.map(cat=>{
    const tasks=data.filter(r=>r.cat===cat);
    const cnt={};
    statusKeys.forEach(s=>{cnt[s]=tasks.filter(r=>r.status===s).length;});
    const pct=tasks.length?Math.round(cnt['已完成']/tasks.length*100):0;
    const lines=statusKeys.filter(s=>cnt[s]>0)
      .map(s=>`<div class="cat-status-line"><span>${s}</span><span>${cnt[s]}</span></div>`).join('');
    return `<div class="cat-status-card">
      <div class="cat-status-name" style="color:${CAT_COLORS[cat]}">${cat}</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:1.1rem;font-weight:900;color:${CAT_COLORS[cat]};margin-bottom:0.4rem">${pct}%</div>
      ${lines}</div>`;
  }).join('');

  const overdueHTML=overdueTasks.length
    ?overdueTasks.slice(0,5).map(r=>{
        const d=getDaysLeft(r);
        return `<div class="overdue-row">逾${Math.abs(d)}天・${r.task.replace(/【.*?】/g,'').trim().slice(0,22)}（${r.date}）</div>`;
      }).join('')+(overdueTasks.length>5?`<div style="font-size:0.8rem;color:#dc2626;margin-top:0.3rem">...共 ${overdueTasks.length} 項逾期</div>`:'')
    :'<div style="color:#059669;font-size:0.85rem;padding:0.3rem 0">✅ 無逾期任務</div>';

  const upcomingHTML=upcoming.length
    ?upcoming.map(r=>{
        const d=getDaysLeft(r);

        return `<div class="dl-item">
          <span class="dl-tag" style="background:${bg};color:${color}">${label}</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)">${r.task.replace(/【.*?】/g,'').trim().slice(0,20)}</span>
          <span style="font-size:0.76rem;color:var(--text-muted);flex-shrink:0;font-family:'IBM Plex Mono',monospace">${r.cat.slice(0,4)}</span>
        </div>`;
      }).join('')
    :'<div style="color:var(--text-muted);font-size:0.88rem;padding:0.3rem 0">近期無到期任務</div>';

  document.getElementById('dashboard-view').innerHTML=`
    <div class="dash-header">
      <div><h2>📊 專案儀表板</h2><p>專案追蹤-自動撈取進度報表</p></div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:0.8rem;color:var(--text-muted)">
        更新時間：${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}
      </div>
    </div>
    <div class="dash-grid">
      <div class="dash-card">
        <div class="dash-card-title">各分類完成率</div>
        ${catStats.map(s=>`
          <div class="cat-row">
            <div class="cat-name" style="color:${CAT_COLORS[s.cat]}">${s.cat}</div>
            <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${s.pct}%;background:${CAT_COLORS[s.cat]}"></div></div>
            <div class="cat-pct" style="color:${CAT_COLORS[s.cat]}">${s.pct}%</div>
          </div>
          <div style="font-size:0.73rem;color:var(--text-muted);margin:-0.35rem 0 0.6rem 82px;font-family:'IBM Plex Mono',monospace">${s.done}/${s.total} 完成</div>
        `).join('')}
      </div>
      <div class="dash-card">
        <div class="dash-card-title">風險預警</div>
        <div class="risk-block" style="background:#fef2f2;border:1px solid #fca5a5">
          <div class="risk-num" style="color:#dc2626">${overdueTasks.length}</div>
          <div><div class="risk-label" style="color:#991b1b">🔴 已逾期任務</div><div class="risk-sub" style="color:#dc2626">需立即關注</div></div>
        </div>
        <div class="risk-block" style="background:#fffbeb;border:1px solid #fcd34d;margin-bottom:1rem">
          <div class="risk-num" style="color:#d97706">${warningTasks.length}</div>

      <div class="cat-status-grid">${catStatusCards}</div>

  const today=new Date();
  const mon=new Date(today); mon.setDate(today.getDate()-((today.getDay()+6)%7));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  const totalDone=data.filter(r=>r.status==='已完成').length;
  const overdueTasks=data.filter(r=>urgencyLevel(r)==='overdue');
  const warningTasks=data.filter(r=>urgencyLevel(r)==='warning');
  const pct=data.length?Math.round(totalDone/data.length*100):0;
  const catLines=CATS.map(cat=>{
    const tasks=data.filter(r=>r.cat===cat);
    const done=tasks.filter(r=>r.status==='已完成').length;
    const p=tasks.length?Math.round(done/tasks.length*100):0;
    const bar='█'.repeat(Math.round(p/10))+'░'.repeat(10-Math.round(p/10));
    return `  ${cat.padEnd(7)}  ${bar}  ${p}%（${done}/${tasks.length}）`;
  }).join('\n');
  const overdueLines=overdueTasks.length
    ?overdueTasks.map(r=>`  🔴 逾${Math.abs(getDaysLeft(r))}天・${r.task.replace(/【.*?】/g,'').trim().slice(0,25)}（${r.date}，${r.status}）`).join('\n')
    :'  ✅ 無逾期任務';
  const warningLines=warningTasks.length
    ?warningTasks.map(r=>{const d=getDaysLeft(r);return `  🟠 ${d===0?'今天':d+'天後'}・${r.task.replace(/【.*?】/g,'').trim().slice(0,25)}（${r.date}）`;}).join('\n')
    :'  ✅ 無即將到期（待開始）任務';
  const weekTasks=data.filter(r=>{if(r.status==='已完成') return false;const d=getDaysLeft(r);return d!==null&&d>=0&&d<=7;});
  const weekLines=weekTasks.length
    ?weekTasks.slice(0,8).map(r=>{const d=getDaysLeft(r);const when=d===0?'今天':d===1?'明天':`${d}天後`;return `  · ${when}・${r.task.replace(/【.*?】/g,'').trim().slice(0,28)}（${r.cat}，${r.status}）`;}).join('\n')
    :'  暫無本週到期任務';
  const report=
`【台北有影 3｜2026】本週進度週報
${fmt(mon)} – ${fmt(sun)}　（${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()} 產出）
${'━'.repeat(40)}

📊 整體進度
  總任務：${data.length} 項　已完成：${totalDone} 項　完成率：${pct}%

📋 各分類進度
${catLines}

🔴 逾期任務（${overdueTasks.length} 項）
${overdueLines}

🟠 3天內到期・尚未開始（${warningTasks.length} 項）
${warningLines}

📌 本週到期任務（7天內，${weekTasks.length} 項）
${weekLines}

${'━'.repeat(40)}
由台北有影 3 專案追蹤系統自動產出`;
  document.getElementById('report-text').value=report;
  const subject=encodeURIComponent(`【台北有影 3】本週進度週報 ${fmt(mon)}–${fmt(sun)}`);
  const body=encodeURIComponent(report);
  document.getElementById('mailto-btn').onclick=()=>{ window.location.href=`mailto:?subject=${subject}&body=${body}`; };
  document.getElementById('weekly-report-modal').classList.add('active');
}
function copyReport(){
  const text=document.getElementById('report-text').value;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>showToast('已複製到剪貼板 ✓')).catch(()=>fallbackCopy(text));
  } else { fallbackCopy(text); }
}
function fallbackCopy(text){
  const ta=document.createElement('textarea'); ta.value=text;
  ta.style.cssText='position:fixed;opacity:0'; document.body.appendChild(ta);
  ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  showToast('已複製到剪貼板 ✓');
}

// ── FONT ──
let fontSize=parseInt(localStorage.getItem('tbff3_font')||'16');
function applyFont(){document.documentElement.style.fontSize=fontSize+'px';}
function adjustFont(d){fontSize=Math.min(22,Math.max(12,fontSize+d));localStorage.setItem('tbff3_font',fontSize);applyFont();showToast('字體：'+fontSize+'px');}
applyFont();

// ── SYNC ──
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyRPxff6kKN3XIazFbgxhotXuUjZYyAhRJ3_t6G-tMTsswdRZ2lD5WKel_WEyM8BrS2/exec';
let isDirty=false;

function syncFields(){
  document.querySelectorAll('[contenteditable]').forEach(el=>{
    const row=data.find(r=>r.id===parseInt(el.dataset.id));
    if(row) row[el.dataset.field]=el.innerText.trim();
  });
}

async function saveAll(){
  syncFields();
  const btn=document.querySelector('.btn-accent'),orig=btn.textContent;
  btn.textContent='同步中…'; btn.disabled=true;
  try{
    const res=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'writeAll',data})});
    const result=await res.json();
    if(result.status!=='ok') throw new Error(result.msg||'failed');
    isDirty=false;
    const n=new Date(),t=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
    document.getElementById('last-saved').textContent=t;
    localStorage.setItem('tbff3_data',JSON.stringify(data));
    btn.textContent='✓ 已同步'; btn.style.background='#059669';
    setTimeout(()=>{btn.textContent=orig;btn.style.background='';},2500);
    showToast('已同步至 Google Sheets ✓');
  }catch(e){
    localStorage.setItem('tbff3_data',JSON.stringify(data));
    btn.textContent='⚠ 失敗'; btn.style.background='#dc2626';
    setTimeout(()=>{btn.textContent=orig;btn.style.background='';},2500);
    showToast('⚠ 同步失敗，已儲存至本機');
  }finally{ btn.disabled=false; }
}

function parseSheetRow(r){
  const clean=v=>(typeof v==='string'&&v.startsWith("'"))?v.slice(1):String(v||'');
  let date=clean(r.date);
  if(date.includes('T')||date.includes('-')){const d=new Date(date);if(!isNaN(d))date=(d.getMonth()+1)+'/'+(d.getDate());}
  else if(!isNaN(Number(r.date))&&Number(r.date)>1000){const d=new Date((Number(r.date)-25569)*86400*1000);date=(d.getUTCMonth()+1)+'/'+(d.getUTCDate());}
  return{
    id:parseInt(clean(r.id))||Math.floor(Math.random()*9000+1000),
    cat:clean(r.cat)||'行政準備', date,
    task:clean(r.task)||'', unit:clean(r.unit)||'',
    status:clean(r.status)||'待開始',
    note:clean(r.note)||'', badge:clean(r.badge)||'', comment:clean(r.comment)||'',
  };
}

async function loadSaved(){
  document.getElementById('table-body').innerHTML=
    '<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--text-muted)">載入中…</td></tr>';
  try{
    const res=await fetch(SCRIPT_URL+'?action=read');
    const remote=await res.json();
    if(Array.isArray(remote)&&remote.length>0){
      data=remote.map(parseSheetRow);
      nextId=Math.max(...data.map(r=>typeof r.id==='number'?r.id:0))+1;
      document.getElementById('last-saved').textContent='已從雲端載入';
    } else {
      data=JSON.parse(JSON.stringify(INITIAL_DATA)); nextId=100;
      document.getElementById('last-saved').textContent='請按「儲存」寫入雲端';
      showToast('⚠ 雲端資料不完整，請按「儲存」');
    }
  }catch{
    const local=localStorage.getItem('tbff3_data');
    if(local){try{data=JSON.parse(local);}catch{data=JSON.parse(JSON.stringify(INITIAL_DATA));}}
    else{data=JSON.parse(JSON.stringify(INITIAL_DATA));}
    nextId=Math.max(...data.map(r=>typeof r.id==='number'?r.id:0))+1;
    document.getElementById('last-saved').textContent='離線模式（本機資料）';
  }
}

function exportCSV(){
  syncFields();
  const h=['分類','日期','工作內容','執行單位','進度狀態','備註','補充說明'];
  const csv='﻿'+[h,...data.map(r=>[r.cat,r.date,r.task,r.unit,r.status,r.note,r.comment])].map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='台北有影3_進度表.csv'; a.click(); showToast('CSV 匯出成功');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveAll();}});

let isEditing=false;
document.addEventListener('focusin',e=>{if(e.target.isContentEditable||['SELECT','TEXTAREA','INPUT'].includes(e.target.tagName))isEditing=true;});
document.addEventListener('focusout',()=>{setTimeout(()=>{isEditing=false;},3000);});

async function pollUpdate(){
  if(isEditing||isDirty) return;
  try{
    const res=await fetch(SCRIPT_URL+'?action=read');
    const remote=await res.json();
    if(!Array.isArray(remote)||remote.length===0) return;
    const newData=remote.map(parseSheetRow);
    if(JSON.stringify(newData)!==JSON.stringify(data)){
      data=newData; renderTable();
      if(currentView==='calendar') renderCalendar();
      if(currentView==='dashboard') renderDashboard();
      const n=new Date();
      document.getElementById('last-saved').textContent='自動同步 '+n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
    }
  }catch{}
}

(async()=>{
  await loadSaved();
  renderTable();
  setInterval(pollUpdate,30000);
})();
</script>
