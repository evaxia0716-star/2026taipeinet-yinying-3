<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>台北有影 3｜名單總管</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0faf8; --surface: #ffffff; --surface2: #e6f5f2;
    --border: #c8e6e0; --border2: #a8d5cc;
    --accent: #0d9488; --accent-hover: #0f766e;
    --text: #1a3330; --text-dim: #3d5c57; --text-muted: #5f8a84;
    --danger: #dc2626; --warn: #d97706; --success: #059669;
    --row-h: 36px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body { font-family: "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: #134e4a; padding: 0 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px;
    box-shadow: 0 2px 12px rgba(13,74,70,0.25);
  }
  .header-left { display: flex; align-items: center; gap: 1rem; }
  .logo { font-family: "IBM Plex Mono", monospace; font-size: 0.68rem; letter-spacing: 0.18em; color: #5eead4; text-transform: uppercase; }
  .project-title { font-size: 1rem; font-weight: 700; color: #fff; }
  .project-title .sub { color: #99f6e4; font-size: 0.85rem; font-weight: 400; margin-left: 0.4rem; }
  .header-right { display: flex; align-items: center; gap: 0.4rem; }

  .btn {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.38rem 0.85rem; border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.12); color: #e0fdf4;
    font-family: "Noto Sans TC", sans-serif; font-size: 0.82rem;
    cursor: pointer; transition: all 0.15s; text-decoration: none;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(255,255,255,0.24); color: #fff; }
  .btn-accent {
    background: #0d9488; border-color: #0d9488; color: #fff;
    font-weight: 700; box-shadow: 0 2px 6px rgba(13,148,136,0.4);
  }
  .btn-accent:hover { background: #0f766e; }
  .btn-accent:disabled { opacity: .55; cursor: not-allowed; }

  .tabs-bar {
    background: #fff; border-bottom: 2px solid var(--border);
    padding: 0 1.5rem; display: flex; align-items: flex-end; gap: 0; overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }
  .tab {
    padding: 0.55rem 1rem 0.5rem; font-size: 0.82rem; font-weight: 600;
    color: var(--text-muted); cursor: pointer;
    border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: all 0.15s; white-space: nowrap; user-select: none;
  }
  .tab:hover { color: var(--accent); }
  .tab.active { color: var(--text); border-bottom-color: var(--tab-color, var(--accent)); }
  .tab .cnt {
    display: inline-block; font-family: "IBM Plex Mono", monospace;
    font-size: 0.68rem; font-weight: 700; padding: 0.04rem 0.38rem;
    border-radius: 20px; margin-left: 0.35rem;
    background: var(--surface2); color: var(--text-muted);
  }
  .tab.active .cnt { background: var(--tab-color, var(--accent)); color: #fff; }

  .toolbar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 0.45rem 1.5rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
  }
  .search-wrap { position: relative; }
  .search-input {
    background: var(--bg); border: 1.5px solid var(--border2);
    border-radius: 7px; padding: 0.36rem 0.75rem 0.36rem 1.9rem;
    color: var(--text); font-family: "Noto Sans TC", sans-serif;
    font-size: 0.84rem; width: 180px; outline: none; transition: all 0.15s;
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
  .search-input::placeholder { color: var(--text-muted); }
  .search-icon { position: absolute; left: 0.55rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.78rem; pointer-events: none; }
  .row-count { font-family: "IBM Plex Mono", monospace; font-size: 0.78rem; color: var(--text-muted); margin-left: auto; }

  .add-btn {
    display: inline-flex; align-items: center; gap: 0.35rem;
    padding: 0.38rem 0.95rem; border-radius: 7px;
    background: var(--accent); border: none; color: #fff;
    font-family: "Noto Sans TC", sans-serif; font-size: 0.84rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s; box-shadow: 0 2px 6px rgba(13,148,136,0.3);
    white-space: nowrap;
  }
  .add-btn:hover { background: var(--accent-hover); }

  .school-hint {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.3rem 0.7rem; border-radius: 7px;
    border: 1.5px solid #a8d5cc; background: #e6f5f2;
    color: var(--text-muted); font-size: 0.76rem;
    white-space: nowrap;
  }

  main { padding: 0.8rem 1.5rem 5rem; }

  .table-wrap {
    overflow-x: auto; border: 1.5px solid var(--border);
    border-radius: 10px; background: #fff;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }
  .table-wrap::-webkit-scrollbar { height: 6px; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  table {
    border-collapse: collapse; font-size: 0.84rem;
    table-layout: fixed;
    width: max-content; min-width: 100%;
  }

  thead th {
    padding: 0.55rem 0.75rem; text-align: left;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--text-dim); background: var(--surface2);
    border-bottom: 1.5px solid var(--border);
    white-space: nowrap; position: sticky; top: 0; z-index: 2;
  }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f0fdf8; }

  tbody td {
    padding: 0;
    vertical-align: middle;
    height: var(--row-h);
  }

  /* 欄寬類別（table-layout:fixed 下，欄寬以這裡的固定值為準，不隨內容伸縮） */
  col.col-num      { width: 32px; }
  col.col-id       { width: 38px; }
  col.col-tiny     { width: 52px; }
  col.col-tag      { width: 78px; }
  col.col-role     { width: 80px; }
  col.col-code     { width: 90px; }
  col.col-status   { width: 90px; }
  col.col-amount   { width: 90px; }
  col.col-date     { width: 132px; }
  col.col-datetime { width: 130px; }
  col.col-tel      { width: 110px; }
  col.col-contact  { width: 100px; }
  col.col-name-s   { width: 80px; }
  col.col-email    { width: 150px; }
  col.col-desc     { width: 140px; }
  col.col-org      { width: 160px; }
  col.col-note     { width: 150px; }
  col.col-edu      { width: 80px; }
  col.col-name     { width: 200px; }
  col.col-ownership{ width: 68px; }
  col.col-district { width: 68px; }
  col.col-zip      { width: 66px; }
  col.col-addr     { width: 230px; }
  col.col-track    { width: 88px; }
  col.col-action   { width: 32px; }
  col.col-default  { width: 110px; }
  col.col-long     { width: 200px; }

  td input, td select {
    background: transparent; border: 1.5px solid transparent;
    color: var(--text); font-family: "Noto Sans TC", sans-serif;
    font-size: 0.82rem; padding: 0.28rem 0.55rem;
    border-radius: 4px; width: 100%; height: 100%; min-height: var(--row-h);
    transition: border-color 0.15s, background 0.15s; outline: none;
    white-space: normal; word-break: break-all;
    line-height: 1.45;
  }
  td input:hover, td select:hover { border-color: var(--border2); background: var(--bg); }
  td input:focus, td select:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 2px rgba(13,148,136,0.12); }

  td.addr-cell { height: auto; padding: 0; vertical-align: top; }
  td.addr-cell .addr-edit {
    display: block;
    width: 100%; min-height: var(--row-h);
    padding: 0.28rem 0.55rem;
    font-family: "Noto Sans TC", sans-serif; font-size: 0.82rem;
    line-height: 1.55; color: var(--text);
    white-space: pre-wrap; word-break: break-all;
    border: 1.5px solid transparent; border-radius: 4px;
    outline: none; cursor: text;
    transition: border-color 0.15s, background 0.15s;
    box-sizing: border-box;
  }
  td.addr-cell .addr-edit:hover { border-color: var(--border2); background: var(--bg); }
  td.addr-cell .addr-edit:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 2px rgba(13,148,136,0.12); }

  /* 唯讀欄位（培訓學員的表單原始資料） */
  td.readonly-cell { height: auto; vertical-align: top; padding: 0; background: #fafcfb; }
  td.readonly-cell .ro-display {
    display: block;
    width: 100%; min-height: var(--row-h);
    padding: 0.32rem 0.55rem;
    font-family: "Noto Sans TC", sans-serif; font-size: 0.82rem;
    line-height: 1.5; color: var(--text-dim);
    white-space: pre-wrap; word-break: break-all;
    border: 1.5px solid transparent; border-radius: 4px;
    cursor: default; box-sizing: border-box;
  }
  td.readonly-cell .ro-display.empty {
    color: var(--text-muted); font-style: italic; font-size: 0.76rem;
  }

  .td-num { width: 32px; text-align: center; color: var(--text-muted); font-family: "IBM Plex Mono", monospace; font-size: 0.72rem; padding: 0 4px; }
  .td-action { width: 32px; text-align: center; }
  .del-btn {
    width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
    border-radius: 4px; border: 1px solid transparent;
    background: transparent; color: var(--text-muted);
    cursor: pointer; font-size: 0.75rem; transition: all 0.15s; margin: auto;
  }
  .del-btn:hover { border-color: #fca5a5; color: var(--danger); background: #fef2f2; }
  tr:not(:hover) .del-btn { opacity: 0; }
  tr:hover .del-btn { opacity: 1; }

  .amount-cell { text-align: right; font-family: "IBM Plex Mono", monospace; font-weight: 600; }
  .amount-cell input { text-align: right; }
  td input.date-input { font-family: "IBM Plex Mono", monospace; letter-spacing: 0.02em; }

  .sum-bar {
    background: #f0fdf8; border-top: 2px solid var(--border);
    padding: 0.5rem 1rem; display: flex; align-items: center; gap: 1.2rem;
    font-size: 0.84rem; flex-wrap: wrap; border-radius: 0 0 10px 10px;
  }
  .sum-item { display: flex; align-items: center; gap: 0.35rem; }
  .sum-label { color: var(--text-muted); font-weight: 600; }
  .sum-val { font-family: "IBM Plex Mono", monospace; font-weight: 700; color: var(--text); }
  .sum-val.total { color: var(--accent); font-size: 1rem; }

  .source-bar {
    background: #f0fdf8; border-top: 1px solid var(--border);
    padding: 0.4rem 1rem; font-size: 0.76rem; color: var(--text-muted);
    border-radius: 0 0 10px 10px;
  }

  .empty-state { text-align: center; padding: 3rem 0; color: var(--text-muted); }
  .empty-icon { font-size: 2.2rem; margin-bottom: 0.6rem; }

  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 140px; color: var(--text-muted); gap: 0.7rem; font-size: 0.86rem;
  }
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--border2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sync-bar {
    background: var(--surface2); border-bottom: 1px solid var(--border);
    padding: 0.32rem 1.5rem; display: flex; align-items: center; gap: 0.8rem;
    font-size: 0.78rem; color: var(--text-muted);
  }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
  .sync-dot.ok  { background: var(--success); }
  .sync-dot.err { background: var(--danger); }
  .sheet-color-bar { height: 3px; background: var(--tab-color, var(--accent)); transition: background 0.2s; }

  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: #134e4a; color: #fff; border-radius: 8px;
    padding: 0.75rem 1.2rem; font-size: 0.88rem; z-index: 2000;
    transform: translateX(130%); transition: transform 0.25s;
    box-shadow: 0 4px 16px rgba(13,74,70,0.3);
  }
  .toast.show { transform: translateX(0); }
  .toast.err  { background: #7f1d1d; }

  /* 橫向捲動時固定「主名稱欄」（如廠商名稱／品項名稱），方便對照 */
  .table-wrap.full-view th.sticky-col,
  .table-wrap.full-view td.sticky-col {
    position: sticky; left: 0; z-index: 1;
    background: #fff;
    box-shadow: 2px 0 6px rgba(13,74,70,0.08);
  }
  .table-wrap.full-view thead th.sticky-col {
    background: var(--surface2); z-index: 3;
  }
  .table-wrap.full-view tbody tr:hover td.sticky-col { background: #f0fdf8; }

  @media (max-width: 1200px) {
    main { padding: 0.6rem 1rem 4rem; }
    header, .tabs-bar, .toolbar, .sync-bar { padding-left: 1rem; padding-right: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">PAC · 公用頻道 · v16</div>
    <div class="project-title">台北有影 3<span class="sub">名單總管</span></div>
  </div>
  <div class="header-right">
    <span id="syncLabel" style="font-family:'IBM Plex Mono',monospace;font-size:0.73rem;color:#5eead4">尚未同步</span>
    <button class="btn" onclick="loadCurrentSheet()">↻ 重整</button>
    <a class="btn" href="./" target="_self">☰ 進度</a>
    <button class="btn btn-accent" id="saveBtn" onclick="saveCurrentSheet()">✓ 儲存</button>
  </div>
</header>

<div class="sheet-color-bar" id="colorBar"></div>

<div class="sync-bar">
  <div class="sync-dot" id="syncDot"></div>
  <span id="syncText">連線中…</span>
  <span style="margin-left:auto;font-family:'IBM Plex Mono',monospace" id="rowInfo"></span>
</div>

<div class="tabs-bar" id="tabsBar"></div>

<div class="toolbar" id="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="searchInput" placeholder="搜尋此名單…" oninput="renderTable()">
  </div>
  <button class="add-btn" id="addRowBtn" onclick="addRow()">＋ 新增</button>
  <span class="row-count" id="rowCount"></span>
</div>

<main>
  <div id="tableArea"><div class="loading"><div class="spinner"></div>載入中…</div></div>
</main>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyRPxff6kKN3XIazFbgxhotXuUjZYyAhRJ3_t6G-tMTsswdRZ2lD5WKel_WEyM8BrS2/exec';
console.log('roster.html · v16（統一完整顯示 + 固定欄寬 + 開銷↔採購串接 + 採購實際支出）');

//   ② 開銷記錄新增「對應採購單號」下拉，選項自動抓採購造冊的編號（買→花 串成一條線）
//   ③ 採購造冊新增「實際支出」手填欄，與「預估總額」並排對照（估得準不準一眼看出）
//  ⚠️ 搭配後端 Apps Script ROSTER_CONFIG 需同步加這兩欄，否則新欄位存不進 Sheets
// ============================================================

const SHEET_NAMES = Object.keys(SHEETS);
let currentSheet = SHEET_NAMES[0];
let tableData    = {};
let loadedSheets = new Set();
let isDirty      = false;
let purchaseOptions = [];   // 開銷記錄「對應採購單號」的下拉選項（取自採購造冊編號）
// ── 多人協作：每個分頁各自記錄「改過的列」與「刪除的列」 ──
let dirtyKeys    = {};   // { 分頁名稱: Set(列的鍵) }
let deletedKeys  = {};   // { 分頁名稱: Set(被刪除列的編號) }
function rowKeyOf(sheetName, row) {
  const cfg = SHEETS[sheetName];
  if (cfg.dynamicHeaders) return String(row._key || row._rowIndex || '');  // 培訓：時間戳記
  return String(row['編號'] || '').trim();                                  // 內部名單：編號
}
function markRowDirty(sheetName, key) {
  if (!key) return;
  (dirtyKeys[sheetName] = dirtyKeys[sheetName] || new Set()).add(String(key));
  isDirty = true;
}

// ── 開銷記錄「對應採購單號」：選項即時取自採購造冊的編號 ──
function buildPurchaseOptions() {
  const rows = tableData['採購造冊'] || [];
  purchaseOptions = rows
    .filter(r => String(r['編號'] ?? '').trim())
    .map(r => {
      const id   = String(r['編號']).trim();
      const item = String(r['品項名稱'] ?? '').trim();
      return { id, label: item ? `${id} · ${item}` : id };
    });
}
// 確保採購造冊已載入（開銷記錄要用它的編號當下拉）；沒載過就先抓一次
function ensurePurchaseOptions() {
  if (loadedSheets.has('採購造冊')) { buildPurchaseOptions(); return Promise.resolve(); }
  return fetch(`${API_URL}?action=readRoster&sheet=${encodeURIComponent('採購造冊')}`, { redirect: 'follow' })
    .then(r => r.json())
    .then(res => {
      if (res && res.ok) {
        tableData['採購造冊'] = res.data || [];
        loadedSheets.add('採購造冊');
        updateCount('採購造冊');
      }
    })
    .catch(() => {})
    .then(() => buildPurchaseOptions());
}

window.addEventListener('DOMContentLoaded', () => {
  buildTabs();
  switchTab(SHEET_NAMES[0]);
});

function buildTabs() {
  const bar = document.getElementById('tabsBar');
  SHEET_NAMES.forEach(name => {
    const div = document.createElement('div');
    div.className = 'tab';
    div.id = 'tab-' + name;
    div.style.setProperty('--tab-color', SHEETS[name].color);
    div.innerHTML = `${name}<span class="cnt" id="cnt-${name}">0</span>`;
    div.onclick = () => switchTab(name);
    bar.appendChild(div);
  });
}

function switchTab(name) {
  currentSheet = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tab = document.getElementById('tab-' + name);
  tab.classList.add('active');
  tab.style.setProperty('--tab-color', SHEETS[name].color);
  document.getElementById('colorBar').style.background = SHEETS[name].color;
  document.getElementById('searchInput').value = '';

  const config = SHEETS[name];

  // 外部 Sheet（學校名單、培訓學員）：禁用「新增」、不允許刪列
  const isExternalSheet = !!config.saveAction;
  document.getElementById('addRowBtn').style.display = isExternalSheet ? 'none' : '';

  // 提示語：根據 sheet 種類顯示不同訊息
  const existingHint = document.getElementById('schoolHint');
  if (existingHint) existingHint.remove();
  if (isExternalSheet) {
    const hint = document.createElement('span');
    hint.id = 'schoolHint';
    hint.className = 'school-hint';
    if (config.dynamicHeaders) {
      const editable = config.editable || [];
      hint.innerHTML = `✏️ 僅以下欄位可編輯：${editable.join('、')}`;
    } else {
      hint.innerHTML = '✏️ 欄位可直接編輯，儲存後同步回 Sheets';
    }
    document.getElementById('toolbar').appendChild(hint);
  }

  if (!loadedSheets.has(name)) {
    loadCurrentSheet();
  } else if (name === '開銷記錄') {
    ensurePurchaseOptions().then(() => renderTable());   // 確保採購編號下拉是最新的
  } else {
    renderTable();
  }
}

function loadCurrentSheet() {
  const name   = currentSheet;
  const config = SHEETS[name];
  const url    = config.sourceAction
    ? `${API_URL}?action=${config.sourceAction}`
    : `${API_URL}?action=readRoster&sheet=${encodeURIComponent(name)}`;

  setTableLoading();
  setSyncState('loading', '連線中…');

  fetch(url, { redirect: 'follow' })
    .then(r => r.json())
    .then(res => {
      if (!res.ok) throw new Error(res.msg || '讀取失敗');
      tableData[name] = res.data || [];

      // 動態欄位：從 API 回傳填入 headers 與 editable
      if (config.dynamicHeaders) {
        if (res.headers) config.headers = res.headers;
        if (res.editable) config.editable = res.editable;
      }

      loadedSheets.add(name);
      updateCount(name);
      setSyncState('ok', `最後同步：${fmtTime()}`);

      // 開銷記錄要先備妥採購編號下拉，再畫表
      if (name === '開銷記錄') {
        ensurePurchaseOptions().then(() => renderTable());
      } else {
        renderTable();
      }
    })
    .catch(err => {
      document.getElementById('tableArea').innerHTML =
        `<div class="loading" style="color:var(--danger)">讀取失敗：${err.message}</div>`;
      setSyncState('err', '連線失敗：' + err.message);
      showToast('讀取失敗：' + err.message, 'err');
    });
}

function saveCurrentSheet() {
  const name   = currentSheet;
  const config = SHEETS[name];
  const all    = tableData[name] || [];
  const btn    = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '儲存中…';

  // 只挑出「改過的列」與「刪除清單」，不整批覆蓋 → 不會洗掉同事其他列
  const dset      = dirtyKeys[name] || new Set();
  const dirtyRows = all.filter(r => dset.has(rowKeyOf(name, r)));
  const deletes   = Array.from(deletedKeys[name] || new Set());

  let body;
  if (config.saveAction) {
    // 外部 Sheet（學校／培訓）：只送改過的列，後端依鍵就地更新（非破壞性）
    let payload = dirtyRows;
    if (config.dynamicHeaders && config.editable) {
      payload = dirtyRows.map(row => {
        const out = { _rowIndex: row._rowIndex, _key: row._key };  // 帶上穩定鍵
        config.editable.forEach(f => { out[f] = row[f] !== undefined ? row[f] : ''; });
        return out;
      });
    }
    body = JSON.stringify({ action: config.saveAction, data: payload });
  } else {
    // 內部名單：逐列合併（只送改過的列 + 刪除清單）
    body = JSON.stringify({ action: 'writeRoster', sheet: name, data: { updates: dirtyRows, deletes } });
  }

  fetch(API_URL, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' },
    body
  })
  .then(r => r.json())
  .then(res => {
    if (!res.ok) throw new Error(res.msg || '儲存失敗');
    showToast(`✓「${name}」已同步（送出 ${dirtyRows.length} 筆變更${deletes.length?`、刪除 ${deletes.length} 筆`:''}）`);
    setSyncState('ok', `最後儲存：${fmtTime()}`);
    dirtyKeys[name]   = new Set();
    deletedKeys[name] = new Set();
    isDirty = false;
    // 重新讀取，顯示合併後（含同事更新）的最新內容
    loadedSheets.delete(name);
    loadCurrentSheet();
  })
  .catch(err => showToast('儲存失敗：' + err.message, 'err'))
  .finally(() => { btn.disabled = false; btn.textContent = '✓ 儲存'; });
}

// ── 加總計算與底部列：抽成獨立函式，給 renderTable 與 updateSumBar 共用 ──
function computeSums(allData, config) {
  const num = v => parseFloat(String(v ?? '0').replace(/,/g, '')) || 0;
  const total   = allData.reduce((s, r) => s + num(r[config.amountCol]), 0);
  const pending = allData.filter(r => r['付款狀態'] === '待申請')
                         .reduce((s, r) => s + num(r[config.amountCol]), 0);
  const applied = allData.filter(r => r['付款狀態'] === '已申請')
                         .reduce((s, r) => s + num(r[config.amountCol]), 0);
  return { total, pending, applied };
}
function sumBarInnerHtml(allData, config) {
  const { total, pending, applied } = computeSums(allData, config);
  const fmt = n => 'NT$ ' + n.toLocaleString('zh-TW');
  return `
    <div class="sum-item"><span class="sum-label">總金額</span><span class="sum-val total">${fmt(total)}</span></div>
    <div class="sum-item"><span class="sum-label">待申請</span><span class="sum-val" style="color:var(--warn)">${fmt(pending)}</span></div>
    <div class="sum-item"><span class="sum-label">已申請</span><span class="sum-val" style="color:var(--success)">${fmt(applied)}</span></div>`;
}
// 只更新底部加總，不重畫整張表（保住輸入框焦點）
function updateSumBar() {
  const config = SHEETS[currentSheet];
  if (!config.amountCol) return;
  const bar = document.getElementById('sumBar');
  if (!bar) return;
  bar.innerHTML = sumBarInnerHtml(tableData[currentSheet] || [], config);
}

// ── 日期欄：哪些欄位要套用日期選擇器 ──
const DATE_COLS = new Set(['日期','簽約日期','報名日期','追蹤日期','預計到貨日','實際到貨日','出生年月日']);
// ── 金額相關欄位（手機叫數字鍵盤用） ──
const MONEY_FIELDS = new Set(['報價','出席費','金額','單價','預估總額','實際支出']);

// 把各種寫法整理成西元「YYYY-MM-DD」（原生日期選擇器只認這個格式）
// 規則：年份 < 1912 視為民國年（自動 +1911）；含時間的時間戳用「當地時間」還原日期，避開時區差一天
function toISODate(raw) {
  const p2 = n => String(n).padStart(2, '0');
  const s = String(raw ?? '').trim();
  if (!s) return '';
  // 含時間或帶 Z 的時間戳（例如 2026-06-16T16:00:00Z、0115-06-16T15:54:00）：用當地時間取出年月日
  if (/T/.test(s) || /Z$/i.test(s) || /\d{1,2}:\d{2}/.test(s)) {
    const dt = new Date(s);
    if (!isNaN(dt.getTime())) {
      let y = dt.getFullYear();
      if (y < 1912) y += 1911;           // 民國年 → 西元年
      return `${y}-${p2(dt.getMonth() + 1)}-${p2(dt.getDate())}`;
    }
  }
  // 純日期字串（2026-06-17、2026/6/7、115/6/7、20260617、1150607）
  let y, mo, d;
  const m = s.match(/(\d{1,4})\D+(\d{1,2})\D+(\d{1,2})/);
  if (m) {
    y = +m[1]; mo = +m[2]; d = +m[3];
  } else {
    const dg = s.replace(/\D/g, '');
    if (dg.length === 8)      { y = +dg.slice(0,4); mo = +dg.slice(4,6); d = +dg.slice(6,8); }  // 西元 YYYYMMDD
    else if (dg.length === 7) { y = +dg.slice(0,3); mo = +dg.slice(3,5); d = +dg.slice(5,7); }  // 民國 YYYMMDD
    else return '';
  }
  if (!y || !mo || !d || mo > 12 || d > 31) return '';
  if (y < 1912) y += 1911;               // 民國年 → 西元年
  return `${y}-${p2(mo)}-${p2(d)}`;
}

function renderCell(header, value, rowIndex, config, isReadOnly) {
  const safe = String(value ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // 唯讀欄位（培訓學員的表單原始資料）
  if (isReadOnly) {
    if (!safe) return `<div class="ro-display empty">（空白）</div>`;
    return `<div class="ro-display">${safe}</div>`;
  }

  // 對應採購單號：動態下拉，選項即時取自採購造冊的編號（顯示「編號 · 品項名稱」，存的是編號）
  if (header === '對應採購單號') {
    const cur = String(value ?? '').trim();
    let opts = '<option value=""></option>';
    const known = purchaseOptions.some(o => o.id === cur);
    if (cur && !known) {
      // 採購那筆被刪了仍保留舊值，不讓畫面變空白
      opts += `<option value="${cur.replace(/"/g,'&quot;')}" selected>${cur}（採購名冊已無此編號）</option>`;
    }
    opts += purchaseOptions.map(o => {
      const lbl = String(o.label).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const idv = String(o.id).replace(/"/g,'&quot;');
      return `<option value="${idv}"${o.id===cur?' selected':''}>${lbl}</option>`;
    }).join('');
    return `<select onchange="updateCell(${rowIndex},'${header}',this.value)">${opts}</select>`;
  }

  const dd = config.dropdowns?.[header];
  if (dd) {
    // 若這格的舊資料是清單裡沒有的選項（例如以前存過「已核銷」），仍保留它，不讓畫面變空白
    const optList = (value && !dd.includes(value)) ? [value, ...dd] : dd;
    const opts = optList.map(o => `<option value="${o}"${o===value?' selected':''}>${o}</option>`).join('');
    return `<select onchange="updateCell(${rowIndex},'${header}',this.value)"><option value=""></option>${opts}</select>`;
  }
  const isAddr = (header === '地址' || header === '通訊地址');
  if (isAddr) {
    return `<div class="addr-edit" contenteditable="true"
      onblur="updateCell(${rowIndex},'${header}',this.innerText.trim())"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();this.blur()}"
      >${safe}</div>`;
  }
  // 日期欄：原生日期選擇器（點一下跳月曆），存成西元 YYYY-MM-DD，免手打、避免時區差一天
  if (DATE_COLS.has(header)) {
    const iso = toISODate(value);
    return `<input type="date" class="date-input" value="${iso}"
      onchange="updateCell(${rowIndex},'${header}',this.value)"
      title="點一下選日期；留白代表尚未填寫">`;
  }
  const inputSafe = String(value ?? '').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  // 金額欄：手機叫出數字鍵盤；輸入時不再整表重畫，可連續輸入多位數
  const numAttr = MONEY_FIELDS.has(header) ? ' inputmode="decimal"' : '';
  return `<input type="text"${numAttr} value="${inputSafe}" oninput="updateCell(${rowIndex},'${header}',this.value)" placeholder="${header}">`;
}

function updateCell(rowIndex, header, value) {
  if (!tableData[currentSheet]) return;
  const row = tableData[currentSheet][rowIndex];
  row[header] = value;
  markRowDirty(currentSheet, rowKeyOf(currentSheet, row));
  updateCount(currentSheet);
  // 金額或付款狀態改變時，只刷新底部加總（不重畫整表，避免輸入框失焦）
  if (SHEETS[currentSheet].amountCol === header || header === '付款狀態') updateSumBar();
}

function addRow() {
  if (!tableData[currentSheet]) tableData[currentSheet] = [];
  const cfg = SHEETS[currentSheet];
  const newRow = {};
  (cfg.headers || []).forEach(h => { newRow[h] = ''; });
  // 自動給「編號」當作對位鍵（多人合併寫回靠它，避免空鍵相撞）
  if ((cfg.headers || []).includes('編號')) {
    const maxNo = (tableData[currentSheet] || []).reduce((m, r) => Math.max(m, parseInt(r['編號']) || 0), 0);
    newRow['編號'] = String(maxNo + 1);
  }
  tableData[currentSheet].push(newRow);
  markRowDirty(currentSheet, rowKeyOf(currentSheet, newRow));
  updateCount(currentSheet);
  renderTable();
  setTimeout(() => {
    const rows = document.querySelectorAll('#tableArea tbody tr');
    if (rows.length) {
      const last = rows[rows.length - 1];
      last.scrollIntoView({ behavior: 'smooth', block: 'center' });
      const first = last.querySelector('input, select');
      if (first) first.focus();
    }
  }, 60);
}

function deleteRow(rowIndex) {
  if (!confirm('確定刪除這一列？')) return;
  const row = tableData[currentSheet][rowIndex];
  const key = String(row['編號'] || '').trim();
  if (key) {
    (deletedKeys[currentSheet] = deletedKeys[currentSheet] || new Set()).add(key);
    if (dirtyKeys[currentSheet]) dirtyKeys[currentSheet].delete(key);
  }
  tableData[currentSheet].splice(rowIndex, 1);
  isDirty = true;
  updateCount(currentSheet);
  renderTable();
}

function updateCount(name) {
  const el = document.getElementById('cnt-' + name);
  if (el) el.textContent = (tableData[name] || []).length;
  const info = document.getElementById('rowInfo');
  if (info && name === currentSheet) info.textContent = `${(tableData[name] || []).length} 筆`;
}

function setTableLoading() {
  document.getElementById('tableArea').innerHTML =
    '<div class="loading"><div class="spinner"></div>從 Google Sheets 讀取中…</div>';
}

function setSyncState(state, text) {
  const dot   = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  const info  = document.getElementById('syncText');
  dot.className = 'sync-dot' + (state==='ok'?' ok':state==='err'?' err':'');
  if (info)  info.textContent  = text;
  if (label) label.textContent = state==='ok' ? fmtTime()+' 已同步' : state==='err' ? '連線異常' : '…';
}

let toastTimer;
function showToast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type==='err' ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 3500);
}

function fmtTime() {
  const n = new Date();
  return `${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`;
}

window.addEventListener('beforeunload', e => { if (isDirty) { e.preventDefault(); e.returnValue = ''; } });
</script>
</body>
</html>
